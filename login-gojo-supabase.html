<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gojo Satoru • Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@400;500;600&display=swap');

        :root {
            --gojo-cyan: #67e8f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: white;
        }

        .gojo-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e1133 50%, #0f172a 100%);
            background-image: url('https://images.unsplash.com/photo-1614730321146-b6fa6a42b0bd?q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .glass {
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(103, 232, 249, 0.35);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
        }

        .six-eyes {
            box-shadow: 0 0 35px var(--gojo-cyan),
                        0 0 70px rgba(103, 232, 249, 0.4);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }

        .infinity-ring {
            animation: spin 25s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="gojo-bg min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <!-- Header con Gojo -->
        <div class="text-center mb-10">
            <div class="flex justify-center mb-6 relative">
                <div class="relative">
                    <div class="w-24 h-24 rounded-full bg-gradient-to-br from-cyan-400 to-blue-500 flex items-center justify-center six-eyes">
                        <i class="fa-solid fa-eye text-6xl text-white"></i>
                    </div>
                    <div class="absolute inset-0 border-4 border-cyan-400/30 rounded-full infinity-ring"></div>
                </div>
            </div>
            <h1 class="text-5xl font-black tracking-tighter text-white">SATORU GOJO</h1>
            <p class="text-cyan-400 text-sm tracking-[6px] mt-2 font-medium">SIX EYES SYSTEM</p>
        </div>

        <div class="glass rounded-3xl p-8">
            <!-- Tabs -->
            <div class="flex mb-8 border-b border-white/10">
                <button onclick="switchTab(0)" id="loginTab"
                    class="flex-1 py-4 text-lg font-semibold border-b-2 border-cyan-400 text-white">Iniciar Sesión</button>
                <button onclick="switchTab(1)" id="registerTab"
                    class="flex-1 py-4 text-lg font-semibold text-white/60">Registrarse</button>
            </div>

            <!-- LOGIN FORM -->
            <div id="loginPanel">
                <button onclick="signInWithGoogle()" 
                    class="w-full flex items-center justify-center gap-3 bg-white hover:bg-gray-100 text-black font-semibold py-4 rounded-2xl mb-6 transition">
                    <i class="fa-brands fa-google text-xl"></i>
                    <span>Continuar con Google</span>
                </button>

                <div class="flex items-center gap-4 my-6">
                    <div class="h-px bg-white/20 flex-1"></div>
                    <span class="text-white/40 text-sm">o usa tu correo</span>
                    <div class="h-px bg-white/20 flex-1"></div>
                </div>

                <input type="email" id="loginEmail" 
                    class="w-full bg-white/10 border border-white/30 focus:border-cyan-400 rounded-2xl px-6 py-4 mb-4 outline-none text-lg"
                    placeholder="Correo electrónico">

                <input type="password" id="loginPassword" 
                    class="w-full bg-white/10 border border-white/30 focus:border-cyan-400 rounded-2xl px-6 py-4 mb-6 outline-none text-lg"
                    placeholder="Contraseña">

                <button onclick="loginWithEmail()" 
                    class="w-full py-4 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-2xl font-bold text-xl hover:brightness-110 transition">
                    ACCEDER AL DOMINIO
                </button>

                <div class="text-center mt-6">
                    <button onclick="showResetModal()" class="text-cyan-400 hover:underline">¿Olvidaste tu contraseña?</button>
                </div>
            </div>

            <!-- REGISTER FORM -->
            <div id="registerPanel" class="hidden">
                <input type="text" id="regName" 
                    class="w-full bg-white/10 border border-white/30 focus:border-cyan-400 rounded-2xl px-6 py-4 mb-4 outline-none text-lg"
                    placeholder="Nombre completo">

                <input type="email" id="regEmail" 
                    class="w-full bg-white/10 border border-white/30 focus:border-cyan-400 rounded-2xl px-6 py-4 mb-4 outline-none text-lg"
                    placeholder="Correo electrónico">

                <input type="password" id="regPassword" 
                    class="w-full bg-white/10 border border-white/30 focus:border-cyan-400 rounded-2xl px-6 py-4 mb-6 outline-none text-lg"
                    placeholder="Contraseña (mínimo 6)">

                <button onclick="registerWithEmail()" 
                    class="w-full py-4 bg-white text-black rounded-2xl font-bold text-xl hover:bg-white/90 transition">
                    CREAR CUENTA
                </button>
            </div>
        </div>

        <p class="text-center text-white/40 text-xs mt-8">Jujutsu Kaisen • Limitless Authentication</p>
    </div>

    <!-- Reset Password Modal -->
    <div id="resetModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="glass rounded-3xl p-8 max-w-sm w-full mx-4">
            <h2 class="text-2xl font-bold mb-6 text-center">Recuperar Acceso</h2>
            <input type="email" id="resetEmailInput" 
                class="w-full bg-white/10 border border-white/30 rounded-2xl px-6 py-4 mb-6 outline-none"
                placeholder="Tu correo electrónico">
            <button onclick="sendResetEmail()" 
                class="w-full py-4 bg-cyan-500 rounded-2xl font-bold">Enviar Enlace de Recuperación</button>
            <button onclick="hideResetModal()" 
                class="w-full mt-4 py-3 text-white/70">Cancelar</button>
        </div>
    </div>

    <script>
        // ==================== SUPABASE CONFIG ====================
        const supabase = window.supabase.createClient(
            'https://mtffjwaybktpwbavsvoa.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10ZmZqd2F5Ymt0cHdiYXZzdm9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNzQ2MzksImV4cCI6MjA5Mzk1MDYzOX0.2qEw2rHe7h3o5RASSncT6w0QI9wCNYKr_mMmmszkFHI'
        );

        // ==================== TAB SWITCH ====================
        function switchTab(tab) {
            if (tab === 0) {
                document.getElementById('loginPanel').classList.remove('hidden');
                document.getElementById('registerPanel').classList.add('hidden');
                document.getElementById('loginTab').classList.add('border-b-2', 'border-cyan-400', 'text-white');
                document.getElementById('registerTab').classList.remove('border-b-2', 'border-cyan-400', 'text-white');
            } else {
                document.getElementById('loginPanel').classList.add('hidden');
                document.getElementById('registerPanel').classList.remove('hidden');
                document.getElementById('loginTab').classList.remove('border-b-2', 'border-cyan-400', 'text-white');
                document.getElementById('registerTab').classList.add('border-b-2', 'border-cyan-400', 'text-white');
            }
        }

        // ==================== GOOGLE LOGIN ====================
        async function signInWithGoogle() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: 'https://shadowwarden098.github.io/Easy/dashboard.html'
                }
            });
            if (error) alert('Error con Google: ' + error.message);
        }

        // ==================== EMAIL LOGIN ====================
        async function loginWithEmail() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                alert("Por favor completa todos los campos");
                return;
            }

            const { error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                alert('Error: ' + error.message);
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        // ==================== REGISTRO ====================
        async function registerWithEmail() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!email || !password) {
                alert("Completa email y contraseña");
                return;
            }

            const { error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: { name: name }
                }
            });

            if (error) {
                alert(error.message);
            } else {
                alert('¡Cuenta creada! Revisa tu correo para confirmar el registro.');
                switchTab(0);
            }
        }

        // ==================== RECUPERACIÓN ====================
        function showResetModal() {
            document.getElementById('resetModal').classList.remove('hidden');
        }

        function hideResetModal() {
            document.getElementById('resetModal').classList.add('hidden');
        }

        async function sendResetEmail() {
            const email = document.getElementById('resetEmailInput').value.trim();
            if (!email) {
                alert("Ingresa tu correo");
                return;
            }

            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: 'https://shadowwarden098.github.io/Easy/dashboard.html'
            });

            if (error) {
                alert(error.message);
            } else {
                alert('Enlace de recuperación enviado a tu correo.');
                hideResetModal();
            }
        }

        // ==================== CHECK SESIÓN ACTIVA ====================
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
