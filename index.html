<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0f0e17;
  --card: #1a1927;
  --panel: #13121e;
  --orange: #ff6b35;
  --purple: #7c5cbf;
  --purple-light: #a47de8;
  --yellow: #ffd166;
  --text: #fffffe;
  --text-dim: #a7a9be;
  --border: rgba(255,255,255,0.08);
  --input-bg: rgba(255,255,255,0.05);
  --success: #06d6a0;
  --error: #ef233c;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  min-height: 100%;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
}

/* ── Background orbs ── */
.bg-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.bg-orb {
  position:absolute; border-radius:50%;
  filter:blur(80px); opacity:0.18;
  animation: orbFloat linear infinite;
}
.bg-orb:nth-child(1){ width:400px;height:400px;background:var(--purple);top:-100px;left:-100px;animation-duration:18s; }
.bg-orb:nth-child(2){ width:350px;height:350px;background:var(--orange);bottom:-80px;right:-80px;animation-duration:22s;animation-direction:reverse; }
.bg-orb:nth-child(3){ width:250px;height:250px;background:var(--yellow);top:40%;left:30%;animation-duration:15s; }
.bg-orb:nth-child(4){ width:180px;height:180px;background:var(--success);top:20%;right:10%;animation-duration:20s;animation-direction:reverse; }
@keyframes orbFloat {
  0%   { transform:translate(0,0) scale(1); }
  33%  { transform:translate(30px,-25px) scale(1.08); }
  66%  { transform:translate(-15px,30px) scale(0.95); }
  100% { transform:translate(0,0) scale(1); }
}

/* Scanline effect */
.scanlines {
  position:fixed;inset:0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events:none; z-index:1;
  animation: scanlineShift 8s linear infinite;
}
@keyframes scanlineShift {
  0%{ background-position:0 0; }
  100%{ background-position:0 100px; }
}

/* grain */
.grain {
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' seed='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:0.04; pointer-events:none; z-index:1;
}

/* floating stars */
.stars-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }

/* ── Layout ── */
.stage {
  position:relative; z-index:2;
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:20px 16px;
}

.card {
  width:100%; max-width:420px;
  border-radius:28px;
  border:1px solid var(--border);
  box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 60px rgba(124,92,191,0.12);
  overflow:hidden;
  animation: cardIn .7s cubic-bezier(.34,1.56,.64,1) both;
  display:flex; flex-direction:column;
}
@keyframes cardIn {
  from { opacity:0; transform:scale(.9) translateY(30px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

/* ── Characters panel ── */
.chars-panel {
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
  overflow:hidden;
  padding-top:16px;
  min-height:220px;
}

/* floor glow */
.chars-panel::after {
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:50px;
  background:linear-gradient(to top, rgba(124,92,191,0.2), transparent);
  pointer-events:none;
}
.floor-line {
  position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--purple-light),var(--orange),transparent);
  opacity:0.5;
  animation: floorPulse 3s ease-in-out infinite;
}
@keyframes floorPulse {
  0%,100% { opacity:0.5; }
  50% { opacity:1; }
}

/* Bubble */
.bubble {
  position:absolute;
  top:10px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px 12px 12px 3px;
  padding:6px 12px;
  font-size:12px; font-weight:600; color:var(--text);
  white-space:nowrap;
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
  pointer-events:none;
  opacity:0; transform:translateY(4px) scale(.92);
  transition:opacity .25s, transform .3s cubic-bezier(.34,1.56,.64,1);
  z-index:10;
}
.bubble.show { opacity:1; transform:translateY(0) scale(1); }
.bubble::after {
  content:'';
  position:absolute; bottom:-5px; left:8px;
  width:10px; height:10px;
  background:var(--card);
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  transform:rotate(45deg);
}

/* particles */
.particle {
  position:absolute;border-radius:50%;
  pointer-events:none;
  animation:particleDrift linear infinite;opacity:0;
}
@keyframes particleDrift {
  0%   { transform:translateY(0) scale(0) rotate(0deg); opacity:0; }
  10%  { opacity:.6; }
  90%  { opacity:.2; }
  100% { transform:translateY(-220px) scale(1.5) rotate(360deg); opacity:0; }
}

/* hearts particle for success */
.heart-particle {
  position:absolute;
  pointer-events:none;
  font-size:16px;
  animation:heartFloat 1.8s ease-out forwards;
  z-index:20;
}
@keyframes heartFloat {
  0%   { transform:translateY(0) scale(0) rotate(-20deg); opacity:1; }
  50%  { opacity:1; }
  100% { transform:translateY(-120px) scale(1.2) rotate(20deg); opacity:0; }
}

/* ── Scene ── */
.scene {
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:6px;
  padding:0 12px;
  position:relative; z-index:2;
  height:190px; width:100%;
}
.char-wrap {
  display:flex; flex-direction:column; align-items:center;
  transform-origin:bottom center;
  will-change:transform;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
}
.char-shadow {
  height:6px; width:75%;
  background:rgba(0,0,0,0.4);
  border-radius:50%; filter:blur(3px);
  margin-top:2px;
  transition:transform .35s ease, opacity .35s ease;
}
svg.char { overflow:visible; }

/* eye lid animation */
.eye-lid {
  transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
  transform-origin: center top;
}
.eye-lid.closed {
  transform: scaleY(0.08);
}
.eye-up {
  transition: cy 0.3s ease;
}

/* ── Form panel ── */
.form-panel {
  background:var(--card);
  padding:32px 28px 36px;
  display:flex; flex-direction:column;
  position:relative;
  overflow:hidden;
}
.form-panel::before {
  content:'';
  position:absolute; top:0; left:0; right:0;
  height:2px;
  background:linear-gradient(90deg, transparent, var(--orange), var(--purple), transparent);
  animation: topBorderAnim 3s ease-in-out infinite;
}
@keyframes topBorderAnim {
  0%,100% { opacity:0.4; }
  50% { opacity:1; }
}

.brand {
  font-family:'Fredoka One',cursive;
  font-size:11px; letter-spacing:.15em;
  color:var(--orange); text-transform:uppercase;
  margin-bottom:6px;
  animation: brandPop 1s cubic-bezier(.34,1.56,.64,1) both;
  animation-delay:.3s;
}
@keyframes brandPop {
  from { opacity:0; transform:translateX(-10px); }
  to   { opacity:1; transform:translateX(0); }
}
h1 {
  font-family:'Fredoka One',cursive;
  font-size:30px; color:var(--text); line-height:1;
  margin-bottom:4px;
  animation: brandPop 1s cubic-bezier(.34,1.56,.64,1) both;
  animation-delay:.4s;
}
.subtitle {
  font-size:13px; color:var(--text-dim); margin-bottom:26px;
  animation: brandPop 1s cubic-bezier(.34,1.56,.64,1) both;
  animation-delay:.5s;
}

.field { margin-bottom:16px; }
.field-label {
  font-size:10px; font-weight:600; color:var(--text-dim);
  letter-spacing:.1em; text-transform:uppercase; margin-bottom:7px;
  display:flex; align-items:center; gap:5px;
}
.field-label .label-icon { font-size:12px; }
.input-wrap { position:relative; }
.input-wrap input {
  width:100%;
  padding:13px 16px;
  background:var(--input-bg);
  border:1.5px solid var(--border);
  border-radius:12px;
  font-family:'DM Sans',sans-serif;
  font-size:15px; color:var(--text);
  outline:none;
  transition:border-color .25s, background .25s, box-shadow .25s, transform .2s;
  caret-color:var(--orange);
}
.input-wrap input::placeholder { color:rgba(167,169,190,0.35); }
.input-wrap input:focus {
  border-color:var(--orange);
  background:rgba(255,107,53,0.06);
  box-shadow:0 0 0 3px rgba(255,107,53,0.12), 0 0 20px rgba(255,107,53,0.08);
  transform:translateY(-1px);
}
.input-wrap input.error-input {
  border-color:var(--error);
  background:rgba(239,35,60,0.06);
  box-shadow:0 0 0 3px rgba(239,35,60,0.12);
  animation:shakeInput .4s ease;
}
@keyframes shakeInput {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)} 80%{transform:translateX(-3px)}
}

/* typing indicator on input */
.input-glow {
  position:absolute; bottom:-1px; left:12px; right:12px;
  height:2px; border-radius:2px;
  background:linear-gradient(90deg, var(--orange), var(--purple-light));
  transform:scaleX(0); transform-origin:left;
  transition:transform .3s ease;
  pointer-events:none;
}
.input-wrap input:focus ~ .input-glow { transform:scaleX(1); }

.eye-btn {
  position:absolute; right:13px; top:50%;
  transform:translateY(-50%);
  background:none; border:none; cursor:pointer;
  font-size:17px; color:var(--text-dim);
  padding:4px;
  transition:color .2s, transform .2s;
}
.eye-btn:hover { color:var(--orange); transform:translateY(-50%) scale(1.15); }

/* strength bar */
.pw-strength-bar {
  height:3px; border-radius:3px;
  background:var(--border);
  margin-top:6px;
  overflow:hidden;
  display:none;
}
.pw-strength-fill {
  height:100%; border-radius:3px;
  width:0%;
  transition:width .4s ease, background .4s ease;
}

.error-msg {
  background:rgba(239,35,60,0.1);
  border:1px solid rgba(239,35,60,0.3);
  border-radius:10px;
  padding:9px 14px;
  font-size:13px; font-weight:600; color:#ff6b7a;
  margin-bottom:14px; display:none;
  animation: errorSlide .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes errorSlide {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}

.extras {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:20px;
}
.check-label {
  display:flex; align-items:center; gap:7px;
  font-size:13px; color:var(--text-dim); cursor:pointer;
}
.check-label input[type=checkbox] { width:15px;height:15px; accent-color:var(--orange); }
.forgot { font-size:13px; color:var(--orange); text-decoration:none; font-weight:600; transition:opacity .2s; }
.forgot:hover { opacity:0.75; text-decoration:underline; }

.btn-main {
  width:100%; padding:14px;
  background:var(--orange); border:none;
  border-radius:12px;
  font-family:'Fredoka One',cursive;
  font-size:17px; color:#fff; letter-spacing:.04em;
  cursor:pointer; position:relative; overflow:hidden;
  transition:transform .15s, box-shadow .2s, background .2s;
  box-shadow:0 6px 28px rgba(255,107,53,0.35);
}
.btn-main::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.18) 0%,transparent 60%);
  opacity:0; transition:opacity .2s;
}
.btn-main::after {
  content:''; position:absolute;
  top:50%; left:50%;
  width:0; height:0;
  background:rgba(255,255,255,0.25);
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:width .5s ease, height .5s ease, opacity .5s ease;
  opacity:0;
}
.btn-main:active::after {
  width:200px; height:200px; opacity:0;
}
.btn-main:hover { transform:translateY(-2px); box-shadow:0 12px 36px rgba(255,107,53,0.45); }
.btn-main:hover::before { opacity:1; }
.btn-main:active { transform:translateY(0); }
.btn-main.success { background:var(--success); box-shadow:0 6px 28px rgba(6,214,160,0.45); }
.btn-main.loading {
  pointer-events:none;
  background: linear-gradient(90deg, var(--orange) 0%, var(--purple) 50%, var(--orange) 100%);
  background-size:200% 100%;
  animation: btnShimmer 1s linear infinite;
}
@keyframes btnShimmer {
  0%{ background-position:0% 50%; }
  100%{ background-position:200% 50%; }
}

.divider {
  display:flex; align-items:center; gap:10px;
  margin:14px 0; color:var(--text-dim); font-size:11px;
}
.divider::before,.divider::after { content:'';flex:1;height:1px;background:var(--border); }

.btn-google {
  width:100%; padding:12px;
  background:var(--input-bg);
  border:1.5px solid var(--border);
  border-radius:12px;
  font-family:'DM Sans',sans-serif;
  font-size:14px; font-weight:600; color:var(--text);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:9px;
  transition:border-color .2s, background .2s, transform .15s, box-shadow .2s;
}
.btn-google:hover {
  border-color:rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.07);
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(0,0,0,0.25);
}

/* footer link */
.signup-link {
  text-align:center; margin-top:16px;
  font-size:13px; color:var(--text-dim);
}
.signup-link a { color:var(--purple-light); font-weight:600; text-decoration:none; }
.signup-link a:hover { text-decoration:underline; }

/* Desktop: side-by-side */
@media (min-width: 700px) {
  .card {
    max-width: 780px;
    flex-direction: row;
  }
  .chars-panel {
    width: 320px;
    flex-shrink: 0;
    border-bottom: none;
    border-right: 1px solid var(--border);
    min-height: 500px;
    justify-content: flex-end;
  }
  .scene { height: 280px; }
  .form-panel { padding: 48px 44px; }
  h1 { font-size: 36px; }
}

/* ── Typing cursor blink ── */
@keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Success confetti ── */
.confetti {
  position:fixed; top:0; left:0; pointer-events:none; z-index:9999;
  width:100%; height:100%;
}
.confetti-piece {
  position:absolute;
  width:8px; height:8px;
  border-radius:2px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform:translateY(-20px) rotate(0deg); opacity:1; }
  100% { transform:translateY(100vh) rotate(720deg); opacity:0; }
}

/* password looking-up pupils */
.eye-lookup { transition: cy 0.3s ease; }

/* ── Reset password modal ── */
#resetOverlay {
  display:none; opacity:0;
  position:fixed; inset:0; z-index:1000;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(6px);
  align-items:center; justify-content:center;
  padding:20px;
  transition:opacity .3s ease;
}
#resetOverlay.open { display:flex; }
</style>
</head>
<body>
<canvas class="stars-canvas" id="starsCanvas"></canvas>
<div class="bg-canvas">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>
<div class="grain"></div>
<div class="scanlines"></div>
<div class="confetti" id="confettiContainer"></div>

<div class="stage">
  <div class="card">

    <!-- ══ CHARACTERS ══ -->
    <div class="chars-panel" id="charsPanel">
      <div class="bubble" id="bubble">👀 ¡Te estamos viendo!</div>

      <div class="scene" id="scene">

        <!-- YELLOW -->
        <div class="char-wrap" id="wrapYellow">
          <svg class="char" width="56" height="145" viewBox="0 0 56 145">
            <rect x="3" y="4" width="50" height="137" rx="18" fill="#ffd166"/>
            <ellipse cx="28" cy="78" rx="17" ry="24" fill="rgba(255,255,255,0.13)"/>
            <!-- Eye whites -->
            <ellipse id="yEyeLW" cx="17" cy="58" rx="8" ry="9" fill="white"/>
            <ellipse id="yEyeRW" cx="39" cy="58" rx="8" ry="9" fill="white"/>
            <!-- Pupils -->
            <circle id="yEyeL" cx="18" cy="59" r="4.5" fill="#1a1a2e"/>
            <circle id="yEyeR" cx="40" cy="59" r="4.5" fill="#1a1a2e"/>
            <!-- Shines -->
            <circle id="yShineL" cx="20" cy="57" r="1.6" fill="white"/>
            <circle id="yShineR" cx="42" cy="57" r="1.6" fill="white"/>
            <!-- Eye lids (top — cover eye when closed) -->
            <ellipse id="yLidL" cx="17" cy="49" rx="8.5" ry="9" fill="#ffd166" style="transform-origin:17px 49px;"/>
            <ellipse id="yLidR" cx="39" cy="49" rx="8.5" ry="9" fill="#ffd166" style="transform-origin:39px 49px;"/>
            <!-- Brows -->
            <path id="yBrowL" d="M10 48 Q17 44 24 48" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" fill="none"/>
            <path id="yBrowR" d="M32 48 Q39 44 46 48" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" fill="none"/>
            <!-- Mouth -->
            <path id="yMouth" d="M15 74 Q28 83 41 74" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <!-- Blush -->
            <ellipse id="yBlushL" cx="7" cy="66" rx="5" ry="3" fill="#e8a800" opacity="0"/>
            <ellipse id="yBlushR" cx="49" cy="66" rx="5" ry="3" fill="#e8a800" opacity="0"/>
            <!-- Hands -->
            <g id="yHands" opacity="0">
              <rect x="3" y="40" width="16" height="22" rx="7" fill="#e8ba00"/>
              <rect x="37" y="40" width="16" height="22" rx="7" fill="#e8ba00"/>
            </g>
          </svg>
          <div class="char-shadow" id="shadowYellow"></div>
        </div>

        <!-- ORANGE (biggest) -->
        <div class="char-wrap" id="wrapOrange">
          <svg class="char" width="90" height="105" viewBox="0 0 90 105">
            <ellipse cx="45" cy="68" rx="42" ry="36" fill="#ff6b35"/>
            <ellipse cx="36" cy="57" rx="16" ry="11" fill="rgba(255,255,255,0.13)" transform="rotate(-20,36,57)"/>
            <!-- arms -->
            <ellipse cx="7" cy="74" rx="8" ry="5" fill="#e85e2a" transform="rotate(-30,7,74)"/>
            <ellipse cx="83" cy="74" rx="8" ry="5" fill="#e85e2a" transform="rotate(30,83,74)"/>
            <!-- Eye whites -->
            <ellipse id="oEyeLW" cx="30" cy="59" rx="11" ry="12" fill="white"/>
            <ellipse id="oEyeRW" cx="60" cy="59" rx="11" ry="12" fill="white"/>
            <!-- Pupils -->
            <circle id="oEyeL" cx="31" cy="60" r="6.5" fill="#1a1a2e"/>
            <circle id="oEyeR" cx="61" cy="60" r="6.5" fill="#1a1a2e"/>
            <!-- Shines -->
            <circle id="oShineL" cx="34" cy="57" r="2.2" fill="white"/>
            <circle id="oShineR" cx="64" cy="57" r="2.2" fill="white"/>
            <!-- Lids -->
            <ellipse id="oLidL" cx="30" cy="47" rx="11.5" ry="12" fill="#ff6b35" style="transform-origin:30px 47px;"/>
            <ellipse id="oLidR" cx="60" cy="47" rx="11.5" ry="12" fill="#ff6b35" style="transform-origin:60px 47px;"/>
            <!-- Brows -->
            <path id="oBrowL" d="M20 47 Q30 42 39 47" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <path id="oBrowR" d="M51 47 Q60 42 70 47" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <!-- Mouth -->
            <path id="oMouth" d="M30 80 Q45 90 60 80" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" fill="none"/>
            <!-- Blush -->
            <ellipse id="oBlushL" cx="17" cy="70" rx="8" ry="4.5" fill="#ff4500" opacity="0"/>
            <ellipse id="oBlushR" cx="73" cy="70" rx="8" ry="4.5" fill="#ff4500" opacity="0"/>
            <!-- Hands -->
            <g id="oHands" opacity="0">
              <rect x="8" y="32" width="17" height="22" rx="7" fill="#e85e2a"/>
              <rect x="65" y="32" width="17" height="22" rx="7" fill="#e85e2a"/>
            </g>
          </svg>
          <div class="char-shadow" id="shadowOrange"></div>
        </div>

        <!-- PURPLE (tallest) -->
        <div class="char-wrap" id="wrapPurple">
          <svg class="char" width="64" height="180" viewBox="0 0 64 180">
            <rect x="3" y="4" width="58" height="172" rx="17" fill="#7c5cbf"/>

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  for(let i=0;i<80;i++){
    stars.push({
      x: Math.random()*window.innerWidth,
      y: Math.random()*window.innerHeight,
      r: Math.random()*1.5+0.3,
      o: Math.random(),
      s: 0.003+Math.random()*0.008,
      d: Math.random()<0.5?1:-1
    });
  }
  function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
      s.o += s.s*s.d;
      if(s.o>=1||s.o<=0) s.d*=-1;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.o*0.6})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  drawStars();
})();

// ── helpers ──
function setMouth(c, type) {
  c._mouth && c._mouth.setAttribute('d', c.mouths[type]);
}
function setBlush(c, v) {
  c._blushL && (c._blushL.style.opacity = v);
  c._blushR && (c._blushR.style.opacity = v);
}
function setHands(c, v) {
  c._hands && (c._hands.style.opacity = v);
}
function setBrows(c, type) {
  c.brows.forEach(b => {
    if (!b._el) return;
    let d = b.base;
    if (type === 'raised') d = d.replace(/Q(\d+) (\d+)/, (_, cx, cy) => `Q${cx} ${+cy - 7}`);
    if (type === 'angry')  d = d.replace(/Q(\d+) (\d+)/, (_, cx, cy) => `Q${cx} ${+cy + 6}`);
    if (type === 'sad')    d = d.replace(/Q(\d+) (\d+)/, (_, cx, cy) => `Q${cx} ${+cy + 4}`);
    b._el.setAttribute('d', d);
  });
}

// ── EYE LIDS (close / open) ──
function setEyelids(c, mode) {
  c.lids.forEach(l => {
    if (!l._el) return;
    if (mode === 'closed') {
      const coverY = l.eyeCY + 2;
      l._el.setAttribute('cy', coverY);
      l._el.style.transition = 'cy 0.28s ease';
    } else if (mode === 'half') {
      const halfY = l.eyeCY - 4;
      l._el.setAttribute('cy', halfY);
      l._el.style.transition = 'cy 0.2s ease';
    } else {
      l._el.setAttribute('cy', l.baseY);
      l._el.style.transition = 'cy 0.3s cubic-bezier(.34,1.56,.64,1)';
    }
  });
}

function setPupilsLookUp(c, lookUp) {
  c.pupils.forEach(p => {
    if (!p._el) return;
    if (lookUp) {
      p._el.setAttribute('cy', p.base[1] - 5);
      if (p._shine) p._shine.setAttribute('cy', p.base[1] - 7.5);
    } else {
      p._el.setAttribute('cy', p.base[1]);
      if (p._shine) p._shine.setAttribute('cy', p.base[1] - 2.5);
    }
  });
}

function applyState(newState) {
  if(state === newState) return;
  state = newState;
  const cfg = stateConfigs[state] || stateConfigs.idle;
  
  chars.forEach((c, i) => {
    setMouth(c, cfg.mouth);
    setBrows(c, cfg.brows || 'normal');
    setBlush(c, cfg.blush);
    setHands(c, cfg.hands);
    c._wrap.style.transform = cfg.transforms[i] || 'none';
    c._shadow.style.transform = cfg.shadows[i] || 'scaleX(1)';
    c._shadow.style.opacity = cfg.shadowOp[i] ?? 1;
  });
}

function moveEyes() {
  const sceneEl = document.getElementById('scene');
  const rect = sceneEl.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;
  
  const dx = mx - centerX;
  const dy = my - centerY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  
  chars.forEach(c => {
    c.pupils.forEach(p => {
      if (!p._el) return;
      const angle = Math.atan2(dy, dx);
      const x = p.base[0] + Math.cos(angle) * p.range;
      const y = p.base[1] + Math.sin(angle) * p.range * 0.6;
      p._el.setAttribute('cx', x);
      p._el.setAttribute('cy', y);
      
      if (p._shine) {
        p._shine.setAttribute('cx', x + 1.5);
        p._shine.setAttribute('cy', y - 1.5);
      }
    });
  });
}

requestAnimationFrame(function trackingLoop() {
  moveEyes();
  requestAnimationFrame(trackingLoop);
});

});

pwInput.addEventListener('input', () => {
  if(pwInput.value.length > 0) {
    applyState('peek');
  } else {
    applyState('idle');
  }
});

// Toggle password visibility
togglePwBtn.addEventListener('click', (e) => {
  e.preventDefault();
  pwVisible = !pwVisible;
  pwInput.type = pwVisible ? 'text' : 'password';
  togglePwBtn.textContent = pwVisible ? '🙈' : '👁️';
  
  if(pwVisible && pwInput.value.length > 0) {
    applyState('covering');
  } else {
    applyState('peek');
  }
});

// ══════════════════════════════════════════
// PASSWORD STRENGTH INDICATOR
// ══════════════════════════════════════════
pwInput.addEventListener('input', () => {
  const strength = calculatePasswordStrength(pwInput.value);
  updatePasswordStrength(strength);
});

function calculatePasswordStrength(password) {
  let score = 0;
  if (password.length >= 6) score++;
  if (password.length >= 12) score++;
  if (/[a-z]/.test(password)) score++;
  if (/[A-Z]/.test(password)) score++;
  if (/[0-9]/.test(password)) score++;
  if (/[^a-zA-Z0-9]/.test(password)) score++;
  return Math.min(score, 4);
}

function updatePasswordStrength(strength) {
  const bar = document.getElementById('pwStrengthBar');
  const fill = document.getElementById('pwStrengthFill');
  
  if (pwInput.value.length > 0) {
    bar.style.display = 'block';
  } else {
    bar.style.display = 'none';
    return;
  }
  
  const percentages = [25, 50, 75, 100];
  const colors = ['#ef233c', '#ffd166', '#06d6a0', '#06d6a0'];
  
  fill.style.width = percentages[strength] + '%';
  fill.style.background = colors[strength];
}

// ══════════════════════════════════════════
// LOGIN HANDLER
// ══════════════════════════════════════════
loginBtn.addEventListener('click', async () => {
  const email = emailInput.value.trim();
  const password = pwInput.value.trim();
  
  errorMsg.style.display = 'none';
  
  if (!email || !password) {
    showError('Por favor completa todos los campos');
    applyState('disgust');
    return;
  }
  
  if (!isValidEmail(email)) {
    showError('Por favor ingresa un correo válido');
    applyState('disgust');
    return;
  }
  
  loginBtn.classList.add('loading');
  applyState('squinting');
  
  try {
    const { data, error } = await sb.auth.signInWithPassword({
      email,
      password
    });
    
    if (error) throw error;
    
    loginBtn.classList.remove('loading');
    loginBtn.classList.add('success');
    applyState('success');
    
    createConfetti();
    
    if (rememberMe.checked) {
      localStorage.setItem('rememberedEmail', email);
    }
    
    setTimeout(() => {
      window.location.href = 'https://shadowwarden098.github.io/Easy/dashboard.html';
    }, 2000);
  } catch (err) {
    loginBtn.classList.remove('loading');
    showError('Correo o contraseña incorrectos');
    applyState('disgust');
    console.error('Login error:', err);
  }
});

// ══════════════════════════════════════════
// EMAIL VALIDATION
// ══════════════════════════════════════════
function isValidEmail(email) {
  const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return regex.test(email);
}

// ══════════════════════════════════════════
// ERROR MESSAGE HANDLER
// ══════════════════════════════════════════
function showError(message) {
  errorMsg.textContent = '🚨 ' + message;
  errorMsg.style.display = 'block';
  emailInput.classList.add('error-input');
  pwInput.classList.add('error-input');
  
  setTimeout(() => {
    emailInput.classList.remove('error-input');
    pwInput.classList.remove('error-input');
  }, 600);
}

// ══════════════════════════════════════════
// GOOGLE OAUTH HANDLER
// ══════════════════════════════════════════
btnGoogle.addEventListener('click', async () => {
  try {
    btnGoogle.disabled = true;
    applyState('peek');
    
    const { data, error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: 'https://shadowwarden098.github.io/Easy/dashboard.html'
      }
    });
    
    if (error) throw error;
  } catch (err) {
    btnGoogle.disabled = false;
    applyState('disgust');
    console.error('Google OAuth error:', err);
  }
});

// ══════════════════════════════════════════
// FORGOT PASSWORD HANDLER
// ══════════════════════════════════════════
forgotLink.addEventListener('click', async (e) => {
  e.preventDefault();
  
  const email = prompt('Ingresa tu correo para resetear la contraseña:');
  if (!email) return;
  
  if (!isValidEmail(email)) {
    alert('Por favor ingresa un correo válido');
    return;
  }
  
  try {
    applyState('peek');
    const { data, error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://shadowwarden098.github.io/Easy/index.html'
    });
    
    if (error) throw error;
    
    alert('✅ Se envió un enlace de reseteo a ' + email);
    applyState('success');
  } catch (err) {
    alert('❌ Error al enviar el correo: ' + err.message);
    applyState('disgust');
    console.error('Password reset error:', err);
  }
});

// ══════════════════════════════════════════
// REGISTER LINK HANDLER
// ══════════════════════════════════════════
registerLink.addEventListener('click', (e) => {
  e.preventDefault();
  openModal();
});

// ══════════════════════════════════════════
// LOAD REMEMBERED EMAIL
// ══════════════════════════════════════════
window.addEventListener('load', () => {
  const remembered = localStorage.getItem('rememberedEmail');
  if (remembered) {
    emailInput.value = remembered;
    rememberMe.checked = true;
  }
});

// ══════════════════════════════════════════
// CONFETTI EFFECT
// ══════════════════════════════════════════
function createConfetti() {
  const container = document.getElementById('confettiContainer');
  container.innerHTML = '';
  
  for (let i = 0; i < 50; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.backgroundColor = ['#ff6b35', '#7c5cbf', '#ffd166', '#06d6a0'][Math.floor(Math.random() * 4)];
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    container.appendChild(piece);
  }
}

// ══════════════════════════════════════════
// ENTER KEY SUBMIT
// ══════════════════════════════════════════
pwInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    loginBtn.click();
  }
});

emailInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    pwInput.focus();
  }
});
