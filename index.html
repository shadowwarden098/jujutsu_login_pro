<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Garden — Autenticación</title>
    <style>
        :root {
            --bg: #070510;
            --red: #c0001a;
            --red-glow: #ff0028;
            --purple: #4a0080;
            --purple-light: #9b30ff;
            --card: rgba(10, 5, 20, 0.88);
            --border: rgba(192, 0, 26, 0.3);
            --text: #f0e8ff;
            --text-dim: #9988bb;
            --input-bg: rgba(255, 255, 255, 0.04);
            --success: #00ff88;
            --error: #ff0028;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
        }

        /* Fondo anime con animación de zoom */
        .background {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: url("login.jpg") no-repeat center;
            background-size: cover;
            animation: bgZoom 20s ease-in-out infinite alternate;
        }

        @keyframes bgZoom {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.08);
            }
        }

        /* Capa de superposición para mejorar legibilidad */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(to right,
                    rgba(7, 5, 16, 0.6) 0%,
                    rgba(7, 5, 16, 0.2) 100%);
        }

        /* Contenedor principal */
        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 8vw;
        }

        /* Panel de vidrio (login/registro) */
        .auth-panel {
            width: 400px;
            max-width: 90%;
            background: rgba(143, 132, 100, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px 32px;
            text-align: center;
            color: white;
            animation: slideIn 1s ease forwards;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .auth-panel .logo {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            letter-spacing: 6px;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(192, 0, 26, 0.7);
        }

        .auth-panel .subtitle {
            font-size: 12px;
            letter-spacing: 3px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        /* Pestañas */
        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 25px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
            color: rgba(255, 255, 255, 0.6);
        }

        .tab.active {
            border-bottom-color: var(--red-glow);
            color: white;
        }

        /* Formularios */
        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .field {
            margin-bottom: 20px;
        }

        .field input {
            width: 100%;
            padding: 14px 16px;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            outline: none;
            font-size: 16px;
            color: white;
            transition: 0.3s;
        }

        .field input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .field input:focus {
            border-bottom-color: var(--red-glow);
        }

        .field input.error {
            border-bottom-color: var(--error);
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-5px);
            }
            60% {
                transform: translateX(5px);
            }
            80% {
                transform: translateX(-3px);
            }
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--red), #7a000f);
            border: none;
            border-radius: 6px;
            font-family: 'Cinzel', serif;
            font-size: 16px;
            font-weight: bold;
            color: white;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 0 20px rgba(192, 0, 26, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(192, 0, 26, 0.6);
        }

        .btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn.success {
            background: linear-gradient(135deg, #005525, #00ff88);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .msg {
            margin: 15px 0 10px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            padding: 8px 12px;
            border-radius: 5px;
        }

        .msg.error {
            background: rgba(192, 0, 26, 0.2);
            border: 1px solid rgba(192, 0, 26, 0.5);
            color: #ff6070;
        }

        .msg.success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: var(--success);
        }

        .extra-links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 13px;
        }

        .extra-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: 0.3s;
        }

        .extra-links a:hover {
            color: var(--red-glow);
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Ajustes responsive */
        @media (max-width: 500px) {
            .main-container {
                padding-left: 5vw;
                padding-right: 5vw;
                justify-content: center;
            }
            .auth-panel {
                padding: 30px 20px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Fondo animado -->
    <div class="background"></div>
    <div class="overlay"></div>

    <div class="main-container">
        <div class="auth-panel">
            <div class="logo">Shadow Garden</div>
            <div class="subtitle">Sistema de autenticación</div>

            <!-- Pestañas -->
            <div class="tabs">
                <div class="tab active" id="tabLogin">Iniciar sesión</div>
                <div class="tab" id="tabRegister">Registrarse</div>
            </div>

            <!-- Sección de Login -->
            <div class="form-section active" id="loginSection">
                <div class="field">
                    <input type="email" id="emailInput" placeholder="Email" autocomplete="off">
                </div>
                <div class="field">
                    <input type="password" id="pwInput" placeholder="Contraseña" autocomplete="off">
                </div>
                <div class="msg error" id="loginError"></div>
                <div class="msg success" id="loginSuccess"></div>
                <button class="btn" id="loginBtn">Ingresar</button>
                <button class="google-btn" id="googleLoginBtn">
                    <div class="spinner" id="googleSpinner"></div>
                    <span id="googleText">Iniciar con Google</span>
                </button>
                <div class="extra-links">
                    <a href="#" id="forgotLink">¿Olvidaste tu contraseña?</a>
                    <a href="#" id="toRegisterLink">Crear cuenta</a>
                </div>
            </div>

            <!-- Sección de Registro -->
            <div class="form-section" id="registerSection">
                <div class="field">
                    <input type="email" id="regEmail" placeholder="Email" autocomplete="off">
                </div>
                <div class="field">
                    <input type="password" id="regPw" placeholder="Contraseña (mín. 6 caracteres)" autocomplete="new-password">
                </div>
                <div class="field">
                    <input type="password" id="regPw2" placeholder="Confirmar contraseña" autocomplete="new-password">
                </div>
                <div class="msg error" id="regError"></div>
                <div class="msg success" id="regSuccess"></div>
                <button class="btn" id="registerBtn">Crear cuenta</button>
                <div class="extra-links">
                    <a href="#" id="toLoginLink">← Ya tengo cuenta</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para recuperar contraseña -->
    <div id="resetModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); justify-content:center; align-items:center; z-index:1000;">
        <div style="background: rgba(10,5,20,0.95); border:1px solid rgba(255,255,255,0.2); border-radius:16px; padding:30px; width:90%; max-width:380px; color:white; text-align:center;">
            <h3 style="font-family:'Cinzel',serif; margin-bottom:15px;">Recuperar acceso</h3>
            <p style="font-size:14px; margin-bottom:20px; opacity:0.8;">Te enviaremos un enlace para restablecer tu contraseña</p>
            <input type="email" id="resetEmail" placeholder="Tu email" style="width:100%; padding:12px; background:transparent; border:none; border-bottom:1px solid white; color:white; outline:none; margin-bottom:15px;">
            <div id="resetMsg" style="min-height:20px; margin-bottom:15px;"></div>
            <button class="btn" id="sendResetBtn">Enviar enlace</button>
            <button style="background:none; border:none; color:white; margin-top:15px; cursor:pointer;" id="closeResetModal">Cancelar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ================== CONFIGURACIÓN SUPABASE ==================
        const sb = supabase.createClient(
            'https://mtffjwaybktpwbavsvoa.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10ZmZqd2F5Ymt0cHdiYXZzdm9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNzQ2MzksImV4cCI6MjA5Mzk1MDYzOX0.2qEw2rHe7h3o5RASSncT6w0QI9wCNYKr_mMmmszkFHI'
        );

        // ================== ELEMENTOS DEL DOM ==================
        // Pestañas
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');
        const loginSection = document.getElementById('loginSection');
        const registerSection = document.getElementById('registerSection');

        // Login
        const emailInput = document.getElementById('emailInput');
        const pwInput = document.getElementById('pwInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const loginSuccess = document.getElementById('loginSuccess');
        const googleBtn = document.getElementById('googleLoginBtn');
        const googleSpinner = document.getElementById('googleSpinner');
        const googleText = document.getElementById('googleText');

        // Registro
        const regEmail = document.getElementById('regEmail');
        const regPw = document.getElementById('regPw');
        const regPw2 = document.getElementById('regPw2');
        const registerBtn = document.getElementById('registerBtn');
        const regError = document.getElementById('regError');
        const regSuccess = document.getElementById('regSuccess');

        // Restablecer
        const resetModal = document.getElementById('resetModal');
        const resetEmail = document.getElementById('resetEmail');
        const sendResetBtn = document.getElementById('sendResetBtn');
        const resetMsg = document.getElementById('resetMsg');
        const closeResetModal = document.getElementById('closeResetModal');

        // ================== CAMBIO DE PESTAÑAS ==================
        function setActiveTab(tab) {
            if (tab === 'login') {
                loginSection.classList.add('active');
                registerSection.classList.remove('active');
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                limpiarMensajes();
            } else {
                registerSection.classList.add('active');
                loginSection.classList.remove('active');
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
                limpiarMensajes();
            }
        }

        tabLogin.addEventListener('click', () => setActiveTab('login'));
        tabRegister.addEventListener('click', () => setActiveTab('register'));
        document.getElementById('toRegisterLink').addEventListener('click', (e) => {
            e.preventDefault();
            setActiveTab('register');
        });
        document.getElementById('toLoginLink').addEventListener('click', (e) => {
            e.preventDefault();
            setActiveTab('login');
        });

        function limpiarMensajes() {
            loginError.style.display = 'none';
            loginSuccess.style.display = 'none';
            regError.style.display = 'none';
            regSuccess.style.display = 'none';
        }

        // ================== FUNCIONES AUXILIARES ==================
        function esEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

        function mostrarError(elemento, msg) {
            elemento.textContent = '⚠ ' + msg;
            elemento.style.display = 'block';
            elemento.classList.add('error');
            setTimeout(() => elemento.classList.remove('error'), 2000);
        }

        function mostrarExito(elemento, msg) {
            elemento.textContent = '✓ ' + msg;
            elemento.style.display = 'block';
        }

        // ================== LOGIN ==================
        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const pw = pwInput.value;
            limpiarMensajes();

            if (!email || !pw) {
                mostrarError(loginError, 'Completa todos los campos');
                return;
            }
            if (!esEmail(email)) {
                mostrarError(loginError, 'Correo inválido');
                return;
            }

            loginBtn.classList.add('loading');
            loginBtn.textContent = 'Verificando…';
            try {
                const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
                if (error) throw error;
                loginBtn.classList.remove('loading');
                loginBtn.classList.add('success');
                loginBtn.textContent = '✓ ¡Acceso concedido!';
                mostrarExito(loginSuccess, 'Redirigiendo…');
                setTimeout(() => window.location.href = 'dashboard.html', 1800);
            } catch (err) {
                loginBtn.classList.remove('loading');
                loginBtn.textContent = 'Ingresar';
                let msg = 'Credenciales incorrectas';
                if (err.message) {
                    if (err.message.includes('Email not confirmed')) msg = 'Confirma tu correo antes de entrar';
                    else if (err.message.includes('Too many')) msg = 'Demasiados intentos';
                    else if (err.message.includes('network') || err.message.includes('fetch')) msg = 'Sin conexión a internet';
                }
                mostrarError(loginError, msg);
            }
        });

        // ================== GOOGLE OAUTH ==================
        googleBtn.addEventListener('click', async () => {
            googleText.style.display = 'none';
            googleSpinner.style.display = 'block';
            try {
                const { error } = await sb.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: 'https://shadowwarden098.github.io/Easy/dashboard.html' }
                });
                if (error) throw error;
            } catch (err) {
                googleText.style.display = 'inline';
                googleSpinner.style.display = 'none';
                mostrarError(loginError, 'Error al conectar con Google');
            }
        });

        // ================== REGISTRO ==================
        registerBtn.addEventListener('click', async () => {
            const email = regEmail.value.trim();
            const pw = regPw.value;
            const pw2 = regPw2.value;
            limpiarMensajes();

            if (!esEmail(email)) { mostrarError(regError, 'Correo inválido'); return; }
            if (pw.length < 6) { mostrarError(regError, 'Mínimo 6 caracteres'); return; }
            if (pw !== pw2) { mostrarError(regError, 'Las contraseñas no coinciden'); return; }

            registerBtn.classList.add('loading');
            registerBtn.textContent = 'Creando…';
            try {
                const { data, error } = await sb.auth.signUp({ email, password: pw });
                registerBtn.classList.remove('loading');
                registerBtn.textContent = 'Crear cuenta';
                if (error) {
                    let m = error.message;
                    if (m.includes('already registered') || m.includes('User already registered')) m = 'Este correo ya está registrado';
                    mostrarError(regError, m);
                } else {
                    const necesitaConfirmar = data.user && !data.session;
                    const msg = necesitaConfirmar ? '✓ Revisa tu Gmail para confirmar' : '✓ ¡Cuenta creada! Ya puedes iniciar sesión';
                    mostrarExito(regSuccess, msg);
                    if (!necesitaConfirmar) {
                        setTimeout(() => {
                            setActiveTab('login');
                            emailInput.value = email;
                        }, 2500);
                    }
                }
            } catch (err) {
                registerBtn.classList.remove('loading');
                registerBtn.textContent = 'Crear cuenta';
                mostrarError(regError, 'Error de conexión');
            }
        });

        // ================== RESTABLECER CONTRASEÑA ==================
        document.getElementById('forgotLink').addEventListener('click', (e) => {
            e.preventDefault();
            resetModal.style.display = 'flex';
            resetEmail.value = emailInput.value;
        });

        closeResetModal.addEventListener('click', () => {
            resetModal.style.display = 'none';
        });

        sendResetBtn.addEventListener('click', async () => {
            const email = resetEmail.value.trim();
            if (!esEmail(email)) {
                resetMsg.innerHTML = '<span style="color:#ff6070;">⚠ Correo inválido</span>';
                return;
            }
            sendResetBtn.classList.add('loading');
            sendResetBtn.textContent = 'Enviando…';
            try {
                const { error } = await sb.auth.resetPasswordForEmail(email, {
                    redirectTo: 'https://shadowwarden098.github.io/Easy/index.html'
                });
                if (error) throw error;
                resetMsg.innerHTML = '<span style="color:#00ff88;">✓ Enlace enviado a ' + email + '</span>';
                sendResetBtn.style.display = 'none';
            } catch (err) {
                sendResetBtn.classList.remove('loading');
                sendResetBtn.textContent = 'Enviar enlace';
                resetMsg.innerHTML = '<span style="color:#ff6070;">⚠ ' + (err.message || 'Error') + '</span>';
            }
        });

        // ================== SESIÓN EXISTENTE ==================
        sb.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                loginBtn.textContent = '✓ ¡Acceso concedido!';
                loginBtn.classList.add('success');
                loginBtn.classList.remove('loading');
                loginSuccess.textContent = '✓ Ya hay sesión activa';
                loginSuccess.style.display = 'block';
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            }
        });

        limpiarMensajes();
    </script>
</body>
</html>
