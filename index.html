<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GameZone — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #060a12;
  --card: #0b1220;
  --panel: #080e1a;
  --orange: #00c8ff;
  --purple: #0a4d8c;
  --purple-light: #4fc3f7;
  --yellow: #e0f7ff;
  --text: #f0faff;
  --text-dim: #7fb3cc;
  --border: rgba(0,200,255,0.12);
  --input-bg: rgba(0,150,220,0.07);
  --success: #00e5cc;
  --error: #ff4d6d;
  --gojo-blue: #00c8ff;
  --gojo-deep: #0a1628;
  --gojo-glow: rgba(0,200,255,0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  min-height: 100%;
  background: var(--bg);
  background-image: 
    radial-gradient(ellipse at 50% 0%, rgba(10,77,140,0.4) 0%, transparent 60%), 
    radial-gradient(ellipse at 80% 100%, rgba(0,200,255,0.15) 0%, transparent 50%);
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
  color: var(--text);
}

/* ── Background layers ── */
.bg-container {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.bg-container > div:first-child {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% -10%, rgba(3,105,161,0.5) 0%, transparent 55%),
    radial-gradient(ellipse at 100% 100%, rgba(0,200,255,0.12) 0%, transparent 40%),
    radial-gradient(ellipse at 0% 80%, rgba(10,77,140,0.2) 0%, transparent 40%),
    linear-gradient(180deg, #03060e 0%, #060a14 40%, #04080f 100%);
}

.gojo-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(80vw, 600px);
  height: min(80vw, 600px);
  background: radial-gradient(circle, rgba(0,200,255,0.08) 0%, transparent 70%);
  animation: gojoGlow 4s ease-in-out infinite;
  pointer-events: none;
}

.horizon-line {
  position: absolute;
  bottom: 38%;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,200,255,0.15), rgba(255,255,255,0.08), rgba(0,200,255,0.15), transparent);
  filter: blur(1px);
}

/* Background orbs */
.bg-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.18;
  animation: orbFloat linear infinite;
}

.bg-orb:nth-child(1) {
  width: 500px;
  height: 500px;
  background: #0a4d8c;
  top: -150px;
  left: -100px;
  animation-duration: 18s;
  opacity: 0.25;
}

.bg-orb:nth-child(2) {
  width: 400px;
  height: 400px;
  background: #00c8ff;
  bottom: -100px;
  right: -80px;
  animation-duration: 22s;
  animation-direction: reverse;
  opacity: 0.12;
}

.bg-orb:nth-child(3) {
  width: 300px;
  height: 300px;
  background: #0369a1;
  top: 35%;
  left: 20%;
  animation-duration: 15s;
  opacity: 0.15;
}

.bg-orb:nth-child(4) {
  width: 200px;
  height: 200px;
  background: #00e5cc;
  top: 15%;
  right: 5%;
  animation-duration: 20s;
  animation-direction: reverse;
  opacity: 0.1;
}

@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -25px) scale(1.08); }
  66% { transform: translate(-15px, 30px) scale(0.95); }
  100% { transform: translate(0, 0) scale(1); }
}

@keyframes gojoGlow {
  0%, 100% { opacity: 0.06; }
  50% { opacity: 0.12; }
}

/* Scanlines */
.scanlines {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 1;
  animation: scanlineShift 8s linear infinite;
}

@keyframes scanlineShift {
  0% { background-position: 0 0; }
  100% { background-position: 0 100px; }
}

/* Grain */
.grain {
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' result='noise'/%3E%3C/filter%3E%3Crect width='256' height='256' fill='%23000' filter='url(%23noise)'/%3E%3C/svg%3E");
  opacity: 0.04;
  pointer-events: none;
  z-index: 1;
}

/* Layout */
.stage {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 34px clamp(18px, 6vw, 110px);
  overflow: hidden;
}

/* Card */
.card {
  width: 100%;
  max-width: 360px;
  border-radius: 22px;
  border: 1px solid rgba(0,200,255,0.2);
  box-shadow: 0 40px 110px rgba(0,0,0,0.85), 0 0 80px rgba(0,200,255,0.12), inset 0 1px 0 rgba(0,200,255,0.15);
  overflow: hidden;
  animation: cardIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 3;
  background: linear-gradient(160deg, rgba(11,18,32,0.97) 0%, rgba(6,10,18,0.99) 100%);
  backdrop-filter: blur(24px);
}

@keyframes cardIn {
  from {
    opacity: 0;
    transform: scale(0.9) translateY(30px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

/* Form Panel */
.form-panel {
  background: linear-gradient(180deg, rgba(10,20,40,0.95), rgba(6,10,18,0.98));
  padding: 32px 28px 36px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

.form-panel::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--orange), var(--purple), transparent);
  animation: topBorderAnim 3s ease-in-out infinite;
}

@keyframes topBorderAnim {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* Brand */
.brand {
  font-family: 'Fredoka One', cursive;
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--orange);
  text-transform: uppercase;
  margin-bottom: 6px;
  animation: brandPop 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  animation-delay: 0.3s;
}

@keyframes brandPop {
  from {
    opacity: 0;
    transform: translateX(-10px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

h1 {
  font-family: 'Fredoka One', cursive;
  font-size: 30px;
  color: var(--text);
  line-height: 1;
  margin-bottom: 4px;
  animation: brandPop 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  animation-delay: 0.4s;
}

.subtitle {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 26px;
  animation: brandPop 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  animation-delay: 0.5s;
}

/* Input Fields */
.field {
  margin-bottom: 16px;
  opacity: 0;
  transform: translateY(12px);
}

.field.visible {
  opacity: 1;
  transform: translateY(0);
  transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.field-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 7px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.field-label .label-icon {
  font-size: 12px;
}

.input-wrap {
  position: relative;
}

.input-wrap input {
  width: 100%;
  padding: 13px 16px;
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: border-color 0.25s, background 0.25s, box-shadow 0.25s, transform 0.2s;
  caret-color: var(--orange);
}

.input-wrap input::placeholder {
  color: rgba(167,169,190,0.35);
}

.input-wrap input:focus {
  border-color: var(--orange);
  background: rgba(255,107,53,0.06);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.12), 0 0 20px rgba(255,107,53,0.08);
  transform: translateY(-1px);
}

.input-wrap input.error-input {
  border-color: var(--error);
  background: rgba(239,35,60,0.06);
  box-shadow: 0 0 0 3px rgba(239,35,60,0.12);
  animation: shakeInput 0.4s ease;
}

@keyframes shakeInput {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  60% { transform: translateX(6px); }
  80% { transform: translateX(-3px); }
}

.input-glow {
  position: absolute;
  bottom: -1px;
  left: 12px;
  right: 12px;
  height: 2px;
  border-radius: 2px;
  background: linear-gradient(90deg, #0284c7, #00c8ff);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
  pointer-events: none;
}

.input-wrap input:focus ~ .input-glow {
  transform: scaleX(1);
}

.eye-btn {
  position: absolute;
  right: 13px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 17px;
  color: var(--text-dim);
  padding: 4px;
  transition: color 0.2s, transform 0.2s;
}

.eye-btn:hover {
  color: var(--orange);
  transform: translateY(-50%) scale(1.15);
}

.error-msg {
  background: rgba(239,35,60,0.1);
  border: 1px solid rgba(239,35,60,0.3);
  border-radius: 10px;
  padding: 9px 14px;
  font-size: 13px;
  font-weight: 600;
  color: #ff6b7a;
  margin-bottom: 14px;
  display: none;
  animation: errorSlide 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes errorSlide {
  from {
    opacity: 0;
    transform: translateY(-6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Extras */
.extras {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}

.extras.visible {
  opacity: 1;
  transform: translateY(0);
}

.check-label {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  color: var(--text-dim);
  cursor: pointer;
}

.check-label input[type="checkbox"] {
  width: 15px;
  height: 15px;
  accent-color: var(--gojo-blue);
}

.forgot {
  font-size: 13px;
  color: var(--orange);
  text-decoration: none;
  font-weight: 600;
  transition: opacity 0.2s;
}

.forgot:hover {
  opacity: 0.75;
  text-decoration: underline;
}

/* Button Main */
.btn-main {
  width: 100%;
  padding: 14px;
  background: var(--orange);
  border: none;
  border-radius: 12px;
  font-family: 'Fredoka One', cursive;
  font-size: 17px;
  color: #fff;
  letter-spacing: 0.04em;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
  box-shadow: 0 6px 28px rgba(255,107,53,0.35);
  opacity: 0;
  transform: translateY(8px);
}

.btn-main.visible {
  opacity: 1;
  transform: translateY(0);
  transition: transform 0.15s, box-shadow 0.2s, background 0.2s, opacity 0.35s ease;
}

.btn-main::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.2s;
}

.btn-main:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 36px rgba(255,107,53,0.45);
}

.btn-main:hover::before {
  opacity: 1;
}

.btn-main:active {
  transform: translateY(0);
}

.btn-main.success {
  background: var(--success);
  box-shadow: 0 6px 28px rgba(6,214,160,0.45);
}

.btn-main.loading {
  pointer-events: none;
  background: linear-gradient(90deg, var(--orange) 0%, var(--purple) 50%, var(--orange) 100%);
  background-size: 200% 100%;
  animation: btnShimmer 1s linear infinite;
}

@keyframes btnShimmer {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

/* Divider */
.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 14px 0;
  color: var(--text-dim);
  font-size: 11px;
  opacity: 0;
  transition: opacity 0.35s ease;
}

.divider.visible {
  opacity: 1;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Button Google */
.btn-google {
  width: 100%;
  padding: 12px;
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  transition: border-color 0.2s, background 0.2s, transform 0.15s, box-shadow 0.2s, opacity 0.35s ease;
  opacity: 0;
  transform: translateY(6px);
}

.btn-google.visible {
  opacity: 1;
  transform: translateY(0);
}

.btn-google:hover {
  border-color: rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.07);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}

.btn-google.loading {
  pointer-events: none;
  opacity: 0.7;
}

.google-spinner {
  display: none;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: var(--orange);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.btn-google.loading .google-spinner {
  display: block;
}

.btn-google.loading .google-icon {
  display: none;
}

.btn-google.loading .google-text {
  display: none;
}

.btn-google.loading .google-loading-text {
  display: block;
}

.google-loading-text {
  display: none;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-dim);
}

/* Signup Link */
.signup-link {
  text-align: center;
  margin-top: 16px;
  font-size: 13px;
  color: var(--text-dim);
  opacity: 0;
  transition: opacity 0.35s ease;
}

.signup-link.visible {
  opacity: 1;
}

.signup-link a {
  color: var(--purple-light);
  font-weight: 600;
  text-decoration: none;
}

.signup-link a:hover {
  text-decoration: underline;
}

/* Modal */
.modal-overlay {
  display: none;
  opacity: 0;
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0,0,0,0.78);
  backdrop-filter: blur(8px);
  align-items: center;
  justify-content: center;
  padding: 20px;
  transition: opacity 0.3s ease;
}

.modal-overlay.open {
  display: flex;
}

.modal-box {
  background: var(--card);
  border: 1px solid rgba(255,107,53,0.25);
  border-radius: 22px;
  width: 100%;
  max-width: 370px;
  padding: 28px 24px;
  box-shadow: 0 40px 100px rgba(0,0,0,0.7);
  animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  text-align: center;
  position: relative;
}

@keyframes popIn {
  from {
    opacity: 0;
    transform: scale(0.88) translateY(18px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

.modal-emoji {
  font-size: 44px;
  display: block;
  margin-bottom: 10px;
  animation: floatModal 3s ease-in-out infinite;
}

@keyframes floatModal {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.modal-title {
  font-family: 'Fredoka One', cursive;
  font-size: 22px;
  color: var(--text);
  margin-bottom: 5px;
}

.modal-sub {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 18px;
  line-height: 1.5;
}

.modal-input {
  width: 100%;
  padding: 12px 14px;
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--text);
  outline: none;
  caret-color: var(--orange);
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 7px;
  box-sizing: border-box;
}

.modal-input:focus {
  border-color: var(--orange);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.12);
}

.modal-hint {
  font-size: 11px;
  min-height: 15px;
  margin-bottom: 14px;
  text-align: left;
  color: var(--text-dim);
}

.modal-hint.ok {
  color: var(--success);
}

.modal-hint.err {
  color: var(--error);
}

.modal-close-btn {
  position: absolute;
  top: 13px;
  right: 13px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 19px;
  cursor: pointer;
  padding: 4px;
  transition: color 0.2s;
}

.modal-close-btn:hover {
  color: var(--orange);
}

.modal-success {
  display: none;
  background: rgba(6,214,160,0.1);
  border: 1px solid rgba(6,214,160,0.3);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--success);
  margin-bottom: 12px;
  animation: errorSlide 0.3s ease;
}

/* Theme Button */
.theme-btn {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 50;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s, background 0.3s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}

.theme-btn:hover {
  border-color: var(--orange);
  transform: scale(1.1) rotate(15deg);
}

/* Light mode */
[data-theme="light"] {
  --bg: #f0eeff;
  --card: #fff;
  --panel: #e8e4fa;
  --text: #1a1927;
  --text-dim: #6b6b8a;
  --border: rgba(0,0,0,0.08);
  --input-bg: rgba(0,0,0,0.04);
}

[data-theme="light"] .bg-orb {
  opacity: 0.09;
}

[data-theme="light"] .scanlines {
  display: none;
}

/* Responsive */
@media (max-width: 820px) {
  .stage {
    justify-content: center;
    padding: 24px 16px;
  }
  
  .card {
    max-width: 390px;
  }
}
</style>
</head>
<body>
<!-- Background containers -->
<div class="bg-container">
  <div></div>
  <div class="gojo-glow"></div>
  <div class="horizon-line"></div>
</div>

<div class="bg-canvas">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>

<div class="grain"></div>
<div class="scanlines"></div>

<!-- Theme toggle -->
<button class="theme-btn" id="themeBtn" title="Cambiar tema">🌙</button>

<!-- Reset password modal -->
<div class="modal-overlay" id="resetModal">
  <div class="modal-box">
    <button class="modal-close-btn" id="resetClose">✕</button>
    <span class="modal-emoji">🔑</span>
    <div class="modal-title">Recuperar contraseña</div>
    <p class="modal-sub">Ingresa tu correo y te enviamos un enlace para resetear tu contraseña</p>
    <div id="resetSuccess" class="modal-success"></div>
    <input class="modal-input" id="resetEmail" type="email" placeholder="tu@correo.com" autocomplete="off"/>
    <div class="modal-hint" id="resetHint">Te enviaremos un enlace a tu Gmail</div>
    <button class="btn-main" id="resetBtn" style="opacity: 1; transform: none;">Enviar enlace 📧</button>
    <div style="margin-top: 12px;">
      <span style="font-size: 12px; color: var(--text-dim); cursor: pointer;" id="backToLogin">← Volver al login</span>
    </div>
  </div>
</div>

<!-- Main Stage -->
<div class="stage">
  <div class="card">
    <div class="form-panel">
      <div class="brand">GameZone</div>
      <h1>Iniciar sesión</h1>
      <p class="subtitle">Bienvenido de vuelta</p>
      
      <div class="field visible">
        <label class="field-label">
          <span class="label-icon">📧</span>
          Correo electrónico
        </label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="tu@correo.com" autocomplete="off"/>
          <div class="input-glow"></div>
        </div>
      </div>

      <div class="field visible">
        <label class="field-label">
          <span class="label-icon">🔐</span>
          Contraseña
        </label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••"/>
          <button class="eye-btn" id="eyeBtn">👁️</button>
          <div class="input-glow"></div>
        </div>
      </div>

      <div class="extras visible">
        <label class="check-label">
          <input type="checkbox" id="remember"/>
          Recuérdame
        </label>
        <a href="#" class="forgot" id="forgotBtn">¿Olvidaste la contraseña?</a>
      </div>

      <button class="btn-main visible" id="loginBtn">Inicia sesión</button>

      <div class="divider visible">Continúa con</div>

      <button class="btn-google visible" id="googleBtn">
        <span class="google-icon">🔵</span>
        <span class="google-text">Google</span>
        <div class="google-spinner"></div>
        <span class="google-loading-text">Conectando...</span>
      </button>

      <div class="signup-link visible">
        ¿No tienes cuenta? <a href="#">Regístrate</a>
      </div>
    </div>
  </div>
</div>

<script>
// Theme toggle
const themeBtn = document.getElementById('themeBtn');
const currentTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', currentTheme);
themeBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';

themeBtn.addEventListener('click', () => {
  const theme = document.documentElement.getAttribute('data-theme');
  const newTheme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  themeBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
});

// Password eye toggle
const eyeBtn = document.getElementById('eyeBtn');
const passwordInput = document.getElementById('password');

eyeBtn.addEventListener('click', (e) => {
  e.preventDefault();
  const isPassword = passwordInput.type === 'password';
  passwordInput.type = isPassword ? 'text' : 'password';
  eyeBtn.textContent = isPassword ? '🙈' : '👁️';
});

// Forgot password
document.getElementById('forgotBtn').addEventListener('click', (e) => {
  e.preventDefault();
  document.getElementById('resetModal').classList.add('open');
});

document.getElementById('resetClose').addEventListener('click', () => {
  document.getElementById('resetModal').classList.remove('open');
});

document.getElementById('backToLogin').addEventListener('click', () => {
  document.getElementById('resetModal').classList.remove('open');
});

// Login button
document.getElementById('loginBtn').addEventListener('click', () => {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  if (!email || !password) {
    alert('Por favor completa todos los campos');
    return;
  }
  
  console.log('Login:', email, password);
  alert('¡Inicio de sesión exitoso!');
});

// Google button
document.getElementById('googleBtn').addEventListener('click', () => {
  document.getElementById('googleBtn').classList.add('loading');
  setTimeout(() => {
    alert('Integración con Google no configurada');
    document.getElementById('googleBtn').classList.remove('loading');
  }, 2000);
});
</script>
</body>
</html>
