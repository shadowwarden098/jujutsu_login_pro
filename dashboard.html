<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GameZone — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f0e17;--card:#1a1927;--panel:#13121e;
  --orange:#ff6b35;--purple:#7c5cbf;--purple-light:#a47de8;
  --yellow:#ffd166;--text:#fffffe;--text-dim:#a7a9be;
  --border:rgba(255,255,255,0.08);--success:#06d6a0;--error:#ef233c;
  --shadow:rgba(0,0,0,0.5);
}
[data-theme="light"]{
  --bg:#f0eeff;--card:#fff;--panel:#e8e4fa;
  --text:#1a1927;--text-dim:#6b6b8a;
  --border:rgba(0,0,0,0.08);--shadow:rgba(0,0,0,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;overflow-x:hidden;color:var(--text);transition:background .3s,color .3s;}
.bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.15;animation:orbFloat linear infinite;}
.bg-orb:nth-child(1){width:500px;height:500px;background:var(--purple);top:-150px;left:-150px;animation-duration:20s;}
.bg-orb:nth-child(2){width:400px;height:400px;background:var(--orange);bottom:-100px;right:-100px;animation-duration:25s;animation-direction:reverse;}
.bg-orb:nth-child(3){width:300px;height:300px;background:var(--yellow);top:40%;left:40%;animation-duration:17s;}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1);}33%{transform:translate(40px,-30px) scale(1.1);}66%{transform:translate(-20px,35px) scale(0.93);}100%{transform:translate(0,0) scale(1);}}
.grain{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:0.035;pointer-events:none;z-index:1;}
canvas.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
/* Loading */
#loadingScreen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s ease;}
.loading-logo{font-family:'Fredoka One',cursive;font-size:36px;color:var(--orange);animation:pulse 1.2s ease-in-out infinite;}
.loading-dots{display:flex;gap:8px;}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--orange);animation:dotBounce .8s ease-in-out infinite;}
.loading-dots span:nth-child(2){animation-delay:.15s;background:var(--purple);}
.loading-dots span:nth-child(3){animation-delay:.3s;background:var(--yellow);}
@keyframes dotBounce{0%,100%{transform:translateY(0);opacity:.4;}50%{transform:translateY(-10px);opacity:1;}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}
/* Page */
.page{position:relative;z-index:2;min-height:100vh;padding:0 0 80px;}
/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(15,14,23,0.88);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;gap:8px;}
[data-theme="light"] header{background:rgba(240,238,255,0.92);}
.logo{font-family:'Fredoka One',cursive;font-size:18px;color:var(--orange);display:flex;align-items:center;gap:6px;flex-shrink:0;}
.logo-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);animation:pulse 2s ease-in-out infinite;}
.header-right{display:flex;align-items:center;gap:7px;}
.icon-btn{background:none;border:1px solid var(--border);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;position:relative;transition:border-color .2s,background .2s,transform .2s;flex-shrink:0;}
.icon-btn:hover{border-color:var(--orange);background:rgba(255,107,53,0.1);transform:scale(1.08);}
.user-pill{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:50px;padding:5px 10px 5px 5px;cursor:pointer;transition:border-color .2s;}
.user-pill:hover{border-color:var(--orange);}
.avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--purple));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.user-name{font-size:11px;font-weight:600;max-width:75px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* Notif panel */
.notif-panel{position:fixed;top:56px;right:10px;width:290px;background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 20px 60px var(--shadow);z-index:200;display:none;animation:fadeDown .25s ease;}
.notif-panel.show{display:block;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.notif-header{padding:12px 14px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.notif-title{font-family:'Fredoka One',cursive;font-size:14px;}
.notif-clear{font-size:11px;color:var(--orange);cursor:pointer;font-weight:600;}
.notif-list{max-height:260px;overflow-y:auto;}
.notif-item{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:9px;cursor:pointer;transition:background .2s;}
.notif-item:hover{background:rgba(255,107,53,0.05);}
.notif-item.unread{border-left:3px solid var(--orange);}
.notif-emoji{font-size:18px;flex-shrink:0;}
.notif-text{font-size:12px;line-height:1.4;}
.notif-time{font-size:10px;color:var(--text-dim);margin-top:2px;}
.notif-empty{padding:20px;text-align:center;color:var(--text-dim);font-size:12px;}
/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(15,14,23,0.96);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 0 12px;}
[data-theme="light"] .bottom-nav{background:rgba(240,238,255,0.96);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 0;transition:transform .2s;position:relative;}
.nav-item:hover{transform:translateY(-2px);}
.nav-icon{font-size:19px;transition:filter .2s,transform .2s;}
.nav-label{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-dim);transition:color .2s;}
.nav-item.active .nav-label{color:var(--orange);}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 8px var(--orange));transform:scale(1.1);}
.nav-badge{position:absolute;top:0;right:calc(50% - 20px);background:var(--error);color:#fff;font-size:9px;font-weight:700;border-radius:50px;padding:1px 5px;min-width:15px;text-align:center;display:none;}
.nav-badge.show{display:block;}
/* Sections */
.section{display:none;animation:fadeUp .35s cubic-bezier(.34,1.56,.64,1) both;}
.section.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
/* Hero */
.hero{padding:20px 16px 0;}
.hero-label{font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--orange);margin-bottom:4px;display:flex;align-items:center;gap:5px;}
.hero-label::before{content:'';width:14px;height:2px;background:var(--orange);border-radius:2px;}
.hero h1{font-family:'Fredoka One',cursive;font-size:25px;line-height:1.15;margin-bottom:3px;}
.hero h1 span{color:var(--orange);}
.hero p{font-size:12px;color:var(--text-dim);margin-bottom:14px;}
/* Liga badge */
.league-badge{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px 14px;margin-bottom:14px;cursor:pointer;transition:border-color .2s;}
.league-badge:hover{border-color:var(--orange);}
.league-icon{font-size:22px;}
.league-info{flex:1;min-width:0;}
.league-name{font-family:'Fredoka One',cursive;font-size:14px;line-height:1;}
.league-xp{font-size:10px;color:var(--text-dim);margin-top:2px;}
.league-bar-wrap{flex:1;height:5px;background:var(--border);border-radius:5px;overflow:hidden;max-width:80px;}
.league-bar-fill{height:100%;border-radius:5px;transition:width 1.2s cubic-bezier(.34,1.56,.64,1);}
/* Racha */
.streak-banner{background:linear-gradient(135deg,rgba(255,107,53,0.12),rgba(124,92,191,0.12));border:1px solid rgba(255,107,53,0.22);border-radius:13px;padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;gap:11px;}
.streak-fire{font-size:26px;animation:fireAnim 1s ease-in-out infinite alternate;}
@keyframes fireAnim{from{transform:scale(1) rotate(-5deg);}to{transform:scale(1.1) rotate(5deg);}}
.streak-num{font-family:'Fredoka One',cursive;font-size:20px;color:var(--orange);}
.streak-label{font-size:11px;color:var(--text-dim);}
/* Stats */
.stats-bar{display:flex;gap:8px;margin-bottom:16px;}
.stat-chip{flex:1;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:10px 6px;text-align:center;transition:border-color .2s,transform .2s;}
.stat-chip:hover{border-color:rgba(255,107,53,0.3);transform:translateY(-2px);}
.stat-num{font-family:'Fredoka One',cursive;font-size:20px;color:var(--orange);line-height:1;}
.stat-label{font-size:9px;color:var(--text-dim);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
/* Section title */
.section-title{font-family:'Fredoka One',cursive;font-size:15px;color:var(--text);margin-bottom:11px;display:flex;align-items:center;gap:7px;}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
/* Chart */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:14px;margin-bottom:18px;}
.chart-title{font-family:'Fredoka One',cursive;font-size:13px;margin-bottom:10px;}
.chart-bars{display:flex;align-items:flex-end;gap:5px;height:72px;}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.chart-bar{width:100%;border-radius:5px 5px 0 0;background:linear-gradient(to top,var(--orange),var(--purple-light));transition:height 1s cubic-bezier(.34,1.56,.64,1);min-height:3px;}
.chart-day{font-size:8px;color:var(--text-dim);font-weight:600;}
/* Logros */
.logros-scroll{display:flex;gap:9px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:18px;}
.logros-scroll::-webkit-scrollbar{display:none;}
.logro-chip{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:9px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:72px;transition:border-color .2s,transform .2s;}
.logro-chip.earned{border-color:var(--yellow);}
.logro-chip:hover{transform:translateY(-3px);}
.logro-emoji{font-size:24px;}
.logro-name{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);text-align:center;line-height:1.2;}
.logro-chip.earned .logro-name{color:var(--yellow);}
.logro-locked{filter:grayscale(1);opacity:0.35;}
/* Games */
.games-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.game-card{background:var(--card);border:1px solid var(--border);border-radius:17px;overflow:hidden;cursor:pointer;transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s,border-color .25s;position:relative;}
.game-card:hover{transform:translateY(-4px) scale(1.02);}
.game-card:active{transform:scale(.97);}
.chess:hover{border-color:var(--purple-light);box-shadow:0 14px 36px rgba(164,125,232,0.18);}
.checkers:hover{border-color:var(--orange);box-shadow:0 14px 36px rgba(255,107,53,0.18);}
.solitaire:hover{border-color:var(--success);box-shadow:0 14px 36px rgba(6,214,160,0.18);}
.memory:hover{border-color:var(--yellow);box-shadow:0 14px 36px rgba(255,209,102,0.18);}
.card-art{height:84px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.chess .card-art{background:linear-gradient(135deg,#2d1f4e,#1a1927);}
.checkers .card-art{background:linear-gradient(135deg,#3d1f10,#1a1927);}
.solitaire .card-art{background:linear-gradient(135deg,#0d3028,#1a1927);}
.memory .card-art{background:linear-gradient(135deg,#3d3010,#1a1927);}
.card-art-emoji{font-size:40px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5));animation:floatEmoji 3s ease-in-out infinite;}
.game-card:nth-child(2) .card-art-emoji{animation-delay:.5s;}
.game-card:nth-child(3) .card-art-emoji{animation-delay:1s;}
.game-card:nth-child(4) .card-art-emoji{animation-delay:1.5s;}
@keyframes floatEmoji{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-6px) rotate(3deg);}}
.card-glow{position:absolute;top:7px;right:7px;width:6px;height:6px;border-radius:50%;animation:pulse 2s ease-in-out infinite;}
.chess .card-glow{background:var(--purple-light);box-shadow:0 0 7px var(--purple-light);}
.checkers .card-glow{background:var(--orange);box-shadow:0 0 7px var(--orange);}
.solitaire .card-glow{background:var(--success);box-shadow:0 0 7px var(--success);}
.memory .card-glow{background:var(--yellow);box-shadow:0 0 7px var(--yellow);}
.card-info{padding:9px 10px 4px;}
.card-name{font-family:'Fredoka One',cursive;font-size:13px;margin-bottom:1px;}
.card-desc{font-size:9px;color:var(--text-dim);line-height:1.3;}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding:6px 10px 10px;border-top:1px solid var(--border);}
.card-plays{font-size:9px;color:var(--text-dim);}
.card-plays span{color:var(--text);font-weight:600;}
.play-btn{font-family:'Fredoka One',cursive;font-size:10px;padding:4px 10px;border:none;border-radius:50px;cursor:pointer;transition:transform .15s;}
.play-btn:hover{transform:scale(1.08);}
.chess .play-btn{background:var(--purple-light);color:#fff;}
.checkers .play-btn{background:var(--orange);color:#fff;}
.solitaire .play-btn{background:var(--success);color:#0f0e17;}
.memory .play-btn{background:var(--yellow);color:#0f0e17;}
.card-coming{position:absolute;inset:0;background:rgba(15,14,23,0.68);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;border-radius:17px;z-index:10;}
.coming-badge{background:var(--card);border:1px solid var(--border);border-radius:50px;padding:5px 12px;font-family:'Fredoka One',cursive;font-size:10px;color:var(--text-dim);}
/* Ranking */
.ranking-list{display:flex;flex-direction:column;gap:7px;}
.rank-item{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 12px;transition:border-color .2s,transform .2s;}
.rank-item:hover{border-color:rgba(255,107,53,0.22);transform:translateX(3px);}
.rank-pos{font-family:'Fredoka One',cursive;font-size:15px;width:22px;text-align:center;flex-shrink:0;}
.rank-pos.gold{color:var(--yellow);}.rank-pos.silver{color:#b0b0c0;}.rank-pos.bronze{color:#cd7f32;}.rank-pos.other{color:var(--text-dim);}
.rank-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--purple),var(--orange));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;overflow:hidden;}
.rank-avatar img{width:100%;height:100%;object-fit:cover;}
.rank-info{flex:1;min-width:0;}
.rank-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-game{font-size:9px;color:var(--text-dim);}
.rank-score{font-family:'Fredoka One',cursive;font-size:15px;color:var(--orange);flex-shrink:0;}
.empty-state{text-align:center;padding:22px 14px;color:var(--text-dim);font-size:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;}
.empty-state .e-icon{font-size:28px;display:block;margin-bottom:6px;}
/* Friends */
.friends-wrap{padding:16px;}
.search-box{position:relative;margin-bottom:16px;}
.search-box input{width:100%;padding:10px 14px 10px 38px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;caret-color:var(--orange);}
.search-box input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,107,53,0.1);}
.search-box input::placeholder{color:rgba(167,169,190,0.4);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
.user-result{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:7px;transition:border-color .2s;}
.user-result:hover{border-color:rgba(255,107,53,0.28);}
.result-info{flex:1;min-width:0;}
.result-name{font-size:12px;font-weight:600;}
.result-user{font-size:10px;color:var(--orange);}
.add-btn{font-family:'Fredoka One',cursive;font-size:11px;padding:5px 12px;border:none;border-radius:50px;background:var(--orange);color:#fff;cursor:pointer;transition:transform .15s;white-space:nowrap;flex-shrink:0;}
.add-btn:hover{transform:scale(1.06);}
.add-btn:disabled{opacity:0.5;pointer-events:none;}
.add-btn.sent{background:var(--text-dim);}
.add-btn.friends-btn{background:var(--success);color:#0f0e17;}
.req-item{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid rgba(255,107,53,0.22);border-radius:12px;padding:10px 12px;margin-bottom:7px;}
.req-actions{display:flex;gap:6px;flex-shrink:0;}
.req-accept{font-family:'Fredoka One',cursive;font-size:11px;padding:5px 10px;border:none;border-radius:50px;background:var(--success);color:#0f0e17;cursor:pointer;transition:transform .15s;}
.req-reject{font-family:'Fredoka One',cursive;font-size:11px;padding:5px 10px;border:none;border-radius:50px;background:rgba(239,35,60,0.12);color:var(--error);cursor:pointer;border:1px solid rgba(239,35,60,0.28);}
.req-accept:hover,.req-reject:hover{transform:scale(1.06);}
.friend-item{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:7px;transition:border-color .2s,transform .2s;cursor:pointer;}
.friend-item:hover{border-color:rgba(255,107,53,0.18);transform:translateX(3px);}
.online-dot{width:7px;height:7px;border-radius:50%;background:#444;flex-shrink:0;}
.online-dot.online{background:var(--success);box-shadow:0 0 5px var(--success);}
.friend-info{flex:1;min-width:0;}
.friend-name{font-size:12px;font-weight:600;}
.friend-sub{font-size:10px;color:var(--text-dim);}
.challenge-btn{font-family:'Fredoka One',cursive;font-size:10px;padding:4px 9px;border:1px solid var(--border);border-radius:50px;background:none;color:var(--text-dim);cursor:pointer;transition:all .2s;flex-shrink:0;}
.challenge-btn:hover{border-color:var(--orange);color:var(--orange);}
/* Perfil */
.profile-wrap{padding:16px;}
.profile-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:12px;text-align:center;}
.profile-avatar-big{width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--purple));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;margin:0 auto 3px;overflow:hidden;border:3px solid var(--border);cursor:pointer;transition:border-color .2s,transform .2s;}
.profile-avatar-big:hover{border-color:var(--orange);transform:scale(1.05);}
.profile-avatar-big img{width:100%;height:100%;object-fit:cover;}
.avatar-edit-hint{font-size:9px;color:var(--text-dim);margin-bottom:9px;cursor:pointer;}
.profile-display-name{font-family:'Fredoka One',cursive;font-size:20px;margin-bottom:2px;}
.profile-username{font-size:12px;color:var(--orange);font-weight:600;margin-bottom:3px;}
.profile-email{font-size:11px;color:var(--text-dim);margin-bottom:12px;}
.league-display{display:inline-flex;align-items:center;gap:5px;background:rgba(255,209,102,0.1);border:1px solid rgba(255,209,102,0.22);border-radius:50px;padding:4px 11px;margin-bottom:12px;}
.league-display-icon{font-size:14px;}
.league-display-name{font-family:'Fredoka One',cursive;font-size:12px;color:var(--yellow);}
.profile-stats{display:flex;border-top:1px solid var(--border);padding-top:12px;}
.profile-stat{flex:1;text-align:center;border-right:1px solid var(--border);}
.profile-stat:last-child{border-right:none;}
.profile-stat-num{font-family:'Fredoka One',cursive;font-size:18px;color:var(--orange);}
.profile-stat-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;}
.profile-section-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:11px;}
.profile-section-title{font-family:'Fredoka One',cursive;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.profile-field{margin-bottom:11px;}
.profile-field label{font-size:9px;font-weight:600;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;display:block;}
.profile-input{width:100%;padding:10px 12px;background:rgba(255,255,255,0.04);border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;caret-color:var(--orange);}
[data-theme="light"] .profile-input{background:rgba(0,0,0,0.04);}
.profile-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,107,53,0.10);}
.profile-input:disabled{opacity:0.45;cursor:not-allowed;}
.save-btn{width:100%;padding:11px;background:var(--orange);border:none;border-radius:10px;font-family:'Fredoka One',cursive;font-size:14px;color:#fff;cursor:pointer;transition:transform .15s,box-shadow .2s;box-shadow:0 4px 18px rgba(255,107,53,0.28);}
.save-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,53,0.38);}
.save-btn.loading{pointer-events:none;background:linear-gradient(90deg,var(--orange),var(--purple),var(--orange));background-size:200%;animation:shimmer 1s linear infinite;}
@keyframes shimmer{0%{background-position:0%;}100%{background-position:200%;}}
.danger-btn{width:100%;padding:10px;background:rgba(239,35,60,0.08);border:1px solid rgba(239,35,60,0.22);border-radius:10px;font-family:'Fredoka One',cursive;font-size:13px;color:var(--error);cursor:pointer;transition:background .2s;}
.danger-btn:hover{background:rgba(239,35,60,0.18);}
/* Logros grid */
.logros-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.logro-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:11px;padding:9px 5px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:border-color .2s,transform .2s;}
.logro-card.earned{border-color:rgba(255,209,102,0.38);background:rgba(255,209,102,0.06);}
.logro-card:hover{transform:translateY(-2px);}
.logro-card .logro-emoji{font-size:20px;}
.logro-card .logro-name{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-dim);text-align:center;line-height:1.2;}
.logro-card.locked-card{filter:grayscale(1);opacity:0.3;}
/* Avatar picker */
.avatar-picker{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:13px;}
.av-opt{width:100%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;border:2px solid transparent;transition:border-color .2s,transform .2s;}
.av-opt:hover{transform:scale(1.12);}
.av-opt.selected{border-color:var(--orange);}
/* Modal */
.modal-overlay{display:none;opacity:0;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.82);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px;transition:opacity .3s ease;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--card);border:1px solid rgba(255,107,53,0.28);border-radius:20px;width:100%;max-width:360px;padding:26px 22px;box-shadow:0 40px 100px rgba(0,0,0,0.7);animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both;text-align:center;position:relative;}
@keyframes popIn{from{opacity:0;transform:scale(.87) translateY(18px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-emoji{font-size:44px;margin-bottom:9px;display:block;animation:floatEmoji 3s ease-in-out infinite;}
.modal-title{font-family:'Fredoka One',cursive;font-size:21px;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--text-dim);margin-bottom:18px;line-height:1.5;}
.username-input-wrap{position:relative;margin-bottom:6px;}
.username-prefix{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--orange);font-weight:700;}
.username-input{width:100%;padding:10px 12px 10px 26px;background:rgba(255,255,255,0.05);border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;caret-color:var(--orange);}
.username-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,107,53,0.12);}
.username-input.ok{border-color:var(--success);}
.username-input.taken{border-color:var(--error);}
.username-hint{font-size:10px;margin-bottom:13px;min-height:14px;}
.username-hint.ok{color:var(--success);}.username-hint.taken{color:var(--error);}.username-hint.checking{color:var(--text-dim);}
.modal-close-btn{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;padding:4px;}
/* Theme toggle */
.theme-toggle{position:relative;width:34px;height:19px;}
.theme-toggle input{opacity:0;width:0;height:0;}
.theme-slider{position:absolute;inset:0;background:var(--border);border-radius:19px;cursor:pointer;transition:background .3s;}
.theme-slider:before{content:'';position:absolute;height:13px;width:13px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:transform .3s;}
input:checked+.theme-slider{background:var(--orange);}
input:checked+.theme-slider:before{transform:translateX(15px);}
/* Share */
.share-box{display:flex;align-items:center;gap:8px;}
.share-val{flex:1;background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.22);border-radius:9px;padding:8px 12px;font-family:'Fredoka One',cursive;font-size:14px;color:var(--orange);}
.copy-btn{padding:8px 13px;background:var(--orange);border:none;border-radius:9px;color:#fff;font-family:'Fredoka One',cursive;font-size:11px;cursor:pointer;transition:transform .15s;}
.copy-btn:hover{transform:scale(1.06);}
/* Toast */
.toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(28px);background:var(--card);border:1px solid var(--border);border-radius:50px;padding:9px 18px;font-size:12px;font-weight:600;z-index:400;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,0.45);}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.success{border-color:rgba(6,214,160,0.38);color:var(--success);}
.toast.error{border-color:rgba(239,35,60,0.38);color:var(--error);}

/* ── RANKING POR JUEGO ── */
.rank-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.rank-tabs::-webkit-scrollbar{display:none;}
.rank-tab{font-family:'Fredoka One',cursive;font-size:10px;padding:5px 12px;border:1px solid var(--border);border-radius:50px;cursor:pointer;color:var(--text-dim);transition:all .2s;background:none;white-space:nowrap;flex-shrink:0;}
.rank-tab.active{border-color:var(--orange);color:var(--orange);background:rgba(255,107,53,0.08);}
.rank-tab:hover:not(.active){border-color:rgba(255,107,53,0.3);color:var(--text);}

/* ── NIVEL DE JUGADOR ── */
.player-level-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(124,92,191,0.18),rgba(255,107,53,0.12));border:1px solid rgba(164,125,232,0.35);border-radius:50px;padding:5px 13px;margin-bottom:12px;}
.level-num{font-family:'Fredoka One',cursive;font-size:15px;color:var(--purple-light);}
.level-label{font-size:10px;color:var(--text-dim);}
.level-bar-wrap{width:70px;height:4px;background:var(--border);border-radius:4px;overflow:hidden;}
.level-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-light));border-radius:4px;transition:width 1s ease;}

/* ── ESTADÍSTICAS AMPLIADAS ── */
.ext-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0;}
.ext-stat{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:11px;padding:10px 12px;}
[data-theme="light"] .ext-stat{background:rgba(0,0,0,0.03);}
.ext-stat-val{font-family:'Fredoka One',cursive;font-size:17px;color:var(--orange);}
.ext-stat-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;margin-top:1px;}

/* ── ACTIVIDAD CALENDAR ── */
.activity-grid{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.act-day{width:14px;height:14px;border-radius:3px;background:var(--border);transition:background .2s;}
.act-day.lvl1{background:rgba(255,107,53,0.25);}
.act-day.lvl2{background:rgba(255,107,53,0.5);}
.act-day.lvl3{background:rgba(255,107,53,0.75);}
.act-day.lvl4{background:var(--orange);}
.act-months{display:flex;gap:0;margin-bottom:4px;font-size:8px;color:var(--text-dim);}

/* ── ESTADO DEL PERFIL ── */
.status-select{width:100%;padding:9px 12px;background:rgba(255,255,255,0.04);border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);outline:none;cursor:pointer;transition:border-color .2s;caret-color:var(--orange);appearance:none;-webkit-appearance:none;}
[data-theme="light"] .status-select{background:rgba(0,0,0,0.04);}
.status-select:focus{border-color:var(--orange);}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--text-dim);margin-top:4px;font-style:italic;}

/* ── FOTO DE PERFIL UPLOAD ── */
.photo-upload-wrap{position:relative;cursor:pointer;width:74px;margin:0 auto 3px;}
.photo-upload-wrap:hover .photo-upload-overlay{opacity:1;}
.photo-upload-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;pointer-events:none;}
.photo-upload-overlay span{font-size:18px;}
.photo-upload-input{display:none;}
.photo-progress{display:none;font-size:10px;color:var(--orange);text-align:center;margin-top:4px;}
.photo-progress.show{display:block;}

/* ── INVITAR AMIGOS ── */
.invite-box{display:flex;align-items:center;gap:8px;margin-top:8px;}
.invite-val{flex:1;background:rgba(255,107,53,0.06);border:1px solid rgba(255,107,53,0.2);border-radius:9px;padding:8px 10px;font-size:11px;color:var(--orange);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.invite-copy{padding:8px 11px;background:var(--orange);border:none;border-radius:9px;color:#fff;font-family:'Fredoka One',cursive;font-size:10px;cursor:pointer;transition:transform .15s;flex-shrink:0;}
.invite-copy:hover{transform:scale(1.06);}

/* ── ACHIEVEMENT POPUP ── */
.achievement-popup{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:linear-gradient(135deg,var(--card),rgba(255,209,102,0.08));border:1px solid rgba(255,209,102,0.4);border-radius:18px;padding:14px 20px;display:flex;align-items:center;gap:12px;z-index:500;opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;box-shadow:0 12px 40px rgba(255,209,102,0.15);min-width:220px;}
.achievement-popup.show{opacity:1;transform:translateX(-50%) translateY(0);}
.ach-pop-emoji{font-size:32px;animation:floatEmoji 2s ease-in-out infinite;}
.ach-pop-title{font-family:'Fredoka One',cursive;font-size:13px;color:var(--yellow);}
.ach-pop-name{font-size:11px;color:var(--text-dim);}
/* Confetti */
.confetti-piece{position:fixed;width:7px;height:10px;border-radius:2px;pointer-events:none;z-index:499;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}

</head>
<body>

<div id="loadingScreen">
  <div class="loading-logo">🎮 GameZone</div>
  <div class="loading-dots"><span></span><span></span><span></span></div>
</div>

<canvas class="stars" id="starsCanvas"></canvas>
<div class="bg-canvas"><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div></div>
<div class="grain"></div>

<!-- USERNAME MODAL -->
<div class="modal-overlay" id="usernameModal">
  <div class="modal-box">
    <span class="modal-emoji">👾</span>
    <div class="modal-title">¡Elige tu @usuario!</div>
    <p class="modal-sub">Tus amigos te buscarán con este nombre</p>
    <div class="username-input-wrap">
      <span class="username-prefix">@</span>
      <input class="username-input" id="usernameInput" placeholder="tunombredeusuario" maxlength="20" autocomplete="off" spellcheck="false"/>
    </div>
    <div class="username-hint" id="usernameHint">Solo letras minúsculas, números y _</div>
    <button class="save-btn" id="usernameBtn" disabled>Guardar y continuar →</button>
  </div>
</div>

<!-- FRIEND PROFILE MODAL -->
<div class="modal-overlay" id="friendProfileModal">
  <div class="modal-box" style="text-align:left;">
    <button class="modal-close-btn" onclick="closeModal('friendProfileModal')">✕</button>
    <div style="text-align:center;margin-bottom:14px;">
      <div class="profile-avatar-big" id="fpAvatar" style="margin:0 auto 6px;cursor:default;transform:none;"></div>
      <div style="font-family:'Fredoka One',cursive;font-size:19px;" id="fpName"></div>
      <div style="font-size:12px;color:var(--orange);font-weight:600;" id="fpUser"></div>
    </div>
    <div style="display:flex;background:rgba(255,255,255,0.04);border-radius:11px;overflow:hidden;margin-bottom:14px;">
      <div style="flex:1;text-align:center;padding:11px 6px;border-right:1px solid var(--border);">
        <div style="font-family:'Fredoka One',cursive;font-size:18px;color:var(--orange);" id="fpPartidas">0</div>
        <div style="font-size:9px;color:var(--text-dim);text-transform:uppercase;">Partidas</div>
      </div>
      <div style="flex:1;text-align:center;padding:11px 6px;border-right:1px solid var(--border);">
        <div style="font-family:'Fredoka One',cursive;font-size:18px;color:var(--orange);" id="fpVictorias">0</div>
        <div style="font-size:9px;color:var(--text-dim);text-transform:uppercase;">Victorias</div>
      </div>
      <div style="flex:1;text-align:center;padding:11px 6px;">
        <div style="font-family:'Fredoka One',cursive;font-size:16px;color:var(--yellow);" id="fpLeague">🥉</div>
        <div style="font-size:9px;color:var(--text-dim);text-transform:uppercase;">Liga</div>
      </div>
    </div>
    <div style="font-family:'Fredoka One',cursive;font-size:13px;margin-bottom:7px;">🏅 Logros</div>
    <div id="fpLogros" style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;min-height:28px;"></div>
    <button class="save-btn" id="fpChallengeBtn">⚔️ Retar a partida</button>
  </div>
</div>

<!-- AVATAR MODAL -->
<div class="modal-overlay" id="avatarModal">
  <div class="modal-box">
    <span style="font-size:34px;display:block;margin-bottom:7px;">🎨</span>
    <div class="modal-title">Tu avatar</div>
    <p class="modal-sub" style="margin-bottom:14px;">Elige un emoji o color favorito</p>
    <div class="avatar-picker" id="avatarPicker"></div>
    <button class="save-btn" id="saveAvatarBtn">Guardar avatar</button>
    <div style="margin-top:9px;"><span style="font-size:11px;color:var(--text-dim);cursor:pointer;" onclick="closeModal('avatarModal')">Cancelar</span></div>
  </div>
</div>

<!-- ACHIEVEMENT POPUP -->
<div class="achievement-popup" id="achievementPopup">
  <div class="ach-pop-emoji" id="achPopEmoji">🏆</div>
  <div>
    <div class="ach-pop-title">¡Logro desbloqueado!</div>
    <div class="ach-pop-name" id="achPopName">—</div>
  </div>
</div>

<!-- NOTIF PANEL -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-header">
    <span class="notif-title">🔔 Notificaciones</span>
    <span class="notif-clear" onclick="clearNotifs()">Leer todo</span>
  </div>
  <div class="notif-list" id="notifList">
    <div class="notif-empty">Sin notificaciones nuevas</div>
  </div>
</div>

<div class="page" id="mainPage" style="display:none;">

  <header>
    <div class="logo"><div class="logo-dot"></div>GameZone</div>
    <div class="header-right">
      <label class="theme-toggle" title="Tema">
        <input type="checkbox" id="themeToggle"/>
        <span class="theme-slider"></span>
      </label>
      <button class="icon-btn" id="notifBtn" title="Notificaciones">
        🔔
        <span style="position:absolute;top:-3px;right:-3px;background:var(--error);color:#fff;font-size:8px;font-weight:700;border-radius:50px;padding:1px 4px;min-width:14px;text-align:center;display:none;" id="notifDot">0</span>
      </button>
      <div class="user-pill" onclick="switchTab('profile')">
        <div class="avatar" id="userAvatar">?</div>
        <span class="user-name" id="userName">…</span>
      </div>
    </div>
  </header>

  <!-- INICIO -->
  <div class="section active" id="sec-home">
    <div class="hero">
      <div class="hero-label">● Bienvenido de vuelta</div>
      <h1>¡Hola, <span id="heroName">jugador</span>! 👋</h1>
      <p>Demuestra tu habilidad y sube de liga</p>
      <div class="league-badge" onclick="switchTab('profile')">
        <span class="league-icon" id="leagueIcon">🥉</span>
        <div class="league-info">
          <div class="league-name" id="leagueName">Bronce</div>
          <div class="league-xp" id="leagueXp">0 / 100 XP</div>
        </div>
        <div class="league-bar-wrap"><div class="league-bar-fill" id="leagueBar" style="width:0%;"></div></div>
      </div>
      <div class="streak-banner" id="streakBanner" style="display:none;">
        <span class="streak-fire">🔥</span>
        <div><div class="streak-num" id="streakNum">0</div><div class="streak-label">victorias consecutivas</div></div>
        <span style="font-size:20px;margin-left:auto;">⚡</span>
      </div>
      <div class="stats-bar">
        <div class="stat-chip"><div class="stat-num" id="statPartidas">0</div><div class="stat-label">Partidas</div></div>
        <div class="stat-chip"><div class="stat-num" id="statVictorias">0</div><div class="stat-label">Victorias</div></div>
        <div class="stat-chip"><div class="stat-num" id="statPuntos">0</div><div class="stat-label">Puntos</div></div>
        <div class="stat-chip"><div class="stat-num" id="statAmigos">0</div><div class="stat-label">Amigos</div></div>
      </div>
    </div>

    <div style="padding:0 16px;">
      <div class="chart-wrap">
        <div class="chart-title">📊 Rendimiento semanal</div>
        <div class="chart-bars" id="chartBars"></div>
      </div>

      <div class="section-title">🏅 Logros</div>
      <div class="logros-scroll" id="logrosHome"></div>

      <div class="section-title">🎮 Juegos</div>
      <div class="games-grid">
        <div class="game-card chess" onclick="goToGame('chess')">
          <div class="card-art"><span class="card-art-emoji">♟️</span><div class="card-glow"></div></div>
          <div class="card-info"><div class="card-name">Ajedrez</div><div class="card-desc">Estrategia clásica</div></div>
          <div class="card-footer"><div class="card-plays">Jugadores: <span>2</span></div><button class="play-btn">Jugar</button></div>
        </div>
        <div class="game-card checkers" onclick="goToGame('checkers')">
          <div class="card-art"><span class="card-art-emoji">🔴</span><div class="card-glow"></div></div>
          <div class="card-info"><div class="card-name">Damas</div><div class="card-desc">El clásico de tablero</div></div>
          <div class="card-footer"><div class="card-plays">Jugadores: <span>2</span></div><button class="play-btn">Jugar</button></div>
        </div>
        <div class="game-card solitaire" onclick="goToGame('solitaire')">
          <div class="card-art"><span class="card-art-emoji">🃏</span><div class="card-glow"></div></div>
          <div class="card-info"><div class="card-name">Solitario</div><div class="card-desc">Klondike clásico</div></div>
          <div class="card-footer"><div class="card-plays">Jugadores: <span>1</span></div><button class="play-btn">Jugar</button></div>
        </div>
        <div class="game-card memory" onclick="showToast('🔜 ¡Próximamente!')">
          <div class="card-art"><span class="card-art-emoji">🧠</span><div class="card-glow"></div></div>
          <div class="card-info"><div class="card-name">Memoria</div><div class="card-desc">Encuentra los pares</div></div>
          <div class="card-footer"><div class="card-plays">Jugadores: <span>1</span></div><button class="play-btn">Jugar</button></div>
          <div class="card-coming"><div class="coming-badge">🔜 Próximamente</div></div>
        </div>
      </div>

      <div class="section-title">🏆 Ranking global</div>
      <div class="rank-tabs">
        <button class="rank-tab active" onclick="switchRankTab('all',this)">🌐 Global</button>
        <button class="rank-tab" onclick="switchRankTab('chess',this)">♟️ Ajedrez</button>
        <button class="rank-tab" onclick="switchRankTab('checkers',this)">🔴 Damas</button>
        <button class="rank-tab" onclick="switchRankTab('solitaire',this)">🃏 Solitario</button>
      </div>
      <div class="ranking-list" id="rankingList">
        <div class="empty-state"><span class="e-icon">🎮</span>Juega una partida para aparecer aquí</div>
      </div>
    </div>
  </div>

  <!-- AMIGOS -->

let currentRankGame='all';
async function loadRanking(game='all'){
  currentRankGame=game;
  try{
    let q=sb.from('scores').select('user_name,game,score,user_id').order('score',{ascending:false});
    if(game!=='all')q=q.eq('game',game);
    const{data:raw}=await q.limit(20);
    if(!raw?.length){document.getElementById('rankingList').innerHTML='<div class="empty-state"><span class="e-icon">🎮</span>Sin datos para este juego aún</div>';return;}

    const best={};
    for(const r of raw){
      const key=r.user_id+'|'+(game==='all'?r.game:game);
      if(!best[key]||r.score>best[key].score)best[key]={...r};
    }
    const sorted=Object.values(best).sort((a,b)=>b.score-a.score).slice(0,5);
    const medals=['gold','silver','bronze','other','other'],emojis=['🥇','🥈','🥉','4','5'];
    const gameLabels={chess:'♟️ Ajedrez',checkers:'🔴 Damas',solitaire:'🃏 Solitario'};
    document.getElementById('rankingList').innerHTML=sorted.map((r,i)=>`
      <div class="rank-item">
        <div class="rank-pos ${medals[i]}">${emojis[i]}</div>
        <div class="rank-avatar" style="background:linear-gradient(135deg,var(--purple),var(--orange));">${(r.user_name||'?')[0].toUpperCase()}</div>
        <div class="rank-info">

// NIVEL DE JUGADOR
function calcLevel(xp){
  const level=Math.floor(Math.sqrt(xp/10))+1;
  const current=Math.floor(Math.sqrt(xp/10));
  const xpForCurrent=current*current*10;
  const xpForNext=(current+1)*(current+1)*10;
  const progress=xp>=xpForNext?100:Math.round((xp-xpForCurrent)/(xpForNext-xpForCurrent)*100);
  return{level:Math.min(level,50),progress};
}
function updatePlayerLevel(xp){
  const{level,progress}=calcLevel(xp);
  const el=document.getElementById('playerLevelNum');
  const bar=document.getElementById('playerLevelBar');
  if(el)el.textContent=level;
  if(bar)bar.style.width=progress+'%';
}

// ESTADÍSTICAS AMPLIADAS
function renderExtStats(data){
  const partidas=data?.length||0;
  const victorias=data?.filter(r=>r.won).length||0;
  const winrate=partidas>0?Math.round(victorias/partidas*100):0;
  // mejor racha histórica
  let bestStreak=0,cur=0;
  for(const r of(data||[])){if(r.won){cur++;if(cur>bestStreak)bestStreak=cur;}else cur=0;}
  // juego favorito
  const gameCounts={};
  (data||[]).forEach(r=>gameCounts[r.game]=(gameCounts[r.game]||0)+1);
  const favGame=Object.entries(gameCounts).sort((a,b)=>b[1]-a[1])[0];
  const gameEmojis={chess:'♟️',checkers:'🔴',solitaire:'🃏',memory:'🧠'};
  const totalPts=data?.reduce((a,r)=>a+(r.score||0),0)||0;
  const wr=document.getElementById('extWinrate');const bs=document.getElementById('extBestStreak');
  const fg=document.getElementById('extFavGame');const tp=document.getElementById('extTotalPts');
  if(wr)wr.textContent=winrate+'%';
  if(bs)bs.textContent=bestStreak;
  if(fg)fg.textContent=favGame?gameEmojis[favGame[0]]||favGame[0]:'—';
  if(tp)tp.textContent=totalPts.toLocaleString();
}

// CALENDARIO DE ACTIVIDAD (28 días)
function renderActivityCalendar(data){
  const grid=document.getElementById('activityGrid');
  if(!grid)return;
  const counts={};
  const now=new Date();
  (data||[]).forEach(r=>{
    const d=new Date(r.created_at);
    const diff=Math.floor((now-d)/(1000*60*60*24));
    if(diff<28){const key=diff;counts[key]=(counts[key]||0)+1;}
  });
  let html='';
  for(let i=27;i>=0;i--){
    const c=counts[i]||0;
    const lvl=c===0?'':c===1?'lvl1':c===2?'lvl2':c===3?'lvl3':'lvl4';
    const d=new Date(now);d.setDate(d.getDate()-i);
    const label=d.toLocaleDateString('es-PE',{day:'2-digit',month:'short'});
    html+=`<div class="act-day ${lvl}" title="${label}: ${c} partida${c!==1?'s':''}"></div>`;
  }
  grid.innerHTML=html;
}

}

function setupRealtime(){realtimeChannel=sb.channel('friends-'+currentUser.id).on('postgres_changes',{event:'INSERT',schema:'public',table:'friends',filter:`friend_id=eq.${currentUser.id}`},async payload=>{const{data:p}=await sb.from('profiles').select('display_name,username').eq('id',payload.new.user_id).single();const name=p?.display_name||p?.username||'Alguien';addNotif('🤝',`${name} te envió una solicitud de amistad`);checkPendingRequests();if(currentTab==='friends')loadRequests();}).subscribe();}

// USERNAME MODAL
async function showUsernameModal(){openModal('usernameModal');const input=document.getElementById('usernameInput'),hint=document.getElementById('usernameHint'),btn=document.getElementById('usernameBtn');const suggested=(currentUser.user_metadata?.full_name||currentUser.email||'').split(' ')[0].toLowerCase().replace(/[^a-z0-9_]/g,'');if(suggested)input.value=suggested;let ct;input.addEventListener('input',()=>{const val=input.value.trim();input.className='username-input';btn.disabled=true;clearTimeout(ct);if(!val){hint.textContent='Solo letras minúsculas, números y _';hint.className='username-hint';return;}if(!/^[a-z0-9_]{3,20}$/.test(val)){hint.textContent=val.length<3?'Mínimo 3 caracteres':'Solo a-z, 0-9 y _';hint.className='username-hint taken';input.className='username-input taken';return;}hint.textContent='Verificando…';hint.className='username-hint checking';ct=setTimeout(async()=>{const{data}=await sb.from('profiles').select('id').eq('username',val).single();if(data){hint.textContent='❌ @'+val+' ya está en uso';hint.className='username-hint taken';input.className='username-input taken';}else{hint.textContent='✅ @'+val+' está disponible';hint.className='username-hint ok';input.className='username-input ok';btn.disabled=false;}},600);});if(input.value)input.dispatchEvent(new Event('input'));btn.onclick=async()=>{const username=input.value.trim().toLowerCase();btn.textContent='⏳ Guardando…';btn.classList.add('loading');btn.disabled=true;const displayName=currentUser.user_metadata?.full_name||currentUser.user_metadata?.name||username;const{error}=await sb.from('profiles').upsert({id:currentUser.id,username,display_name:displayName,avatar_color:'#ff6b35'});btn.classList.remove('loading');if(error){showToast('❌ '+error.message,'error');btn.textContent='Guardar y continuar →';btn.disabled=false;}else{closeModal('usernameModal');currentProfile={id:currentUser.id,username,display_name:displayName};populateUI();showToast('🎉 ¡Bienvenido, @'+username+'!','success');}};}

// LOGOUT
async function doLogout(){if(realtimeChannel)sb.removeChannel(realtimeChannel);if(challengeChannel)sb.removeChannel(challengeChannel);clearInterval(challengePollInterval);showToast('👋 Hasta pronto…');await sb.auth.signOut();setTimeout(()=>window.location.href='index.html',800);}
document.getElementById('logoutBtn2').addEventListener('click',doLogout);

// INIT
async function init(){const saved=localStorage.getItem('gz_theme');if(saved==='light')applyTheme(true);const{data:{session}}=await sb.auth.getSession();const loading=document.getElementById('loadingScreen');loading.style.opacity='0';setTimeout(()=>loading.style.display='none',400);if(!session){window.location.href='index.html';return;}currentUser=session.user;if(window.location.hash)history.replaceState(null,'',window.location.pathname);document.getElementById('mainPage').style.display='block';const{data:profile}=await sb.from('profiles').select('*').eq('id',currentUser.id).single();if(!profile||!profile.username){await showUsernameModal();}else{currentProfile=profile;populateUI();}
  const stats=await loadStats();await loadRanking('all');await checkPendingRequests();setupRealtime();setupChallengeListener();
  const friendCount=await loadFriendsList();
  const earned=computeAchievements(stats||{},friendCount||0);
  lastEarnedIds=new Set(earned); // Registrar sin mostrar popup al inicio
  renderLogros(earned,document.getElementById('logrosHome'),true);
  sb.auth.onAuthStateChange((ev,s)=>{if(ev==='SIGNED_IN'&&s)history.replaceState(null,'',window.location.pathname);});}
init();
</script>
